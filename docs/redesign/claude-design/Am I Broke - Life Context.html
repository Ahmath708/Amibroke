<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Am I Broke? — Life Context</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;450;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0B0B0F;
    --card: #16161F;
    --raised: #1C1C24;
    --neon: #FF007A;
    --line: rgba(255,255,255,0.08);
    --text: #FFFFFF;
    --muted: rgba(255,255,255,0.50);
    --faint: rgba(255,255,255,0.30);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: radial-gradient(900px 600px at 50% -10%, #15151d 0%, #0a0a0d 55%, #07070a 100%);
    font-family: 'Geist', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #scaler { transform-origin: center center; }

  /* ---------- screen shell ---------- */
  .screen {
    height: 100%; width: 100%; background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; position: relative; overflow: hidden;
  }

  /* ---------- pinned top nav (back chevron) ---------- */
  .lc-topbar {
    flex: 0 0 auto; padding: 60px 24px 6px;
    display: flex; align-items: center;
  }

  /* ---------- scrolling content ---------- */
  .lc-scroll {
    flex: 1 1 auto; min-height: 0; overflow-y: auto;
    padding: 14px 24px 150px;
  }
  .lc-scroll::-webkit-scrollbar { width: 0; }

  /* ---------- header ---------- */
  .lc-header h1 {
    margin: 0; font-size: 44px; font-weight: 800;
    letter-spacing: -2px; line-height: 0.98; color: #fff;
  }
  .lc-header p {
    margin: 14px 0 0; font-size: 15px; line-height: 1.5; font-weight: 450;
    color: var(--muted); max-width: 320px; text-wrap: pretty;
  }

  /* ---------- dropdown cards (State / Birthday) ---------- */
  .lc-fields { margin-top: 30px; display: flex; flex-direction: column; gap: 12px; }
  .drop-card {
    width: 100%; text-align: left; font-family: inherit; cursor: pointer;
    position: relative; background: var(--raised); border: 1px solid var(--line);
    border-radius: 16px; padding: 14px 18px;
    display: flex; flex-direction: column; gap: 5px;
    transition: border-color .18s ease, background .18s ease, transform .1s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .drop-card:hover { border-color: rgba(255,255,255,0.16); }
  .drop-card:active { transform: scale(.99); }
  .drop-label { font-size: 12px; font-weight: 600; color: var(--faint); letter-spacing: 0.2px; }
  .drop-value { font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.3px; }
  .drop-chev {
    position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
    color: var(--faint); display: flex;
  }

  /* ---------- chip subsections ---------- */
  .chip-block { margin-top: 32px; }
  .chip-label {
    font-size: 12px; font-weight: 600; color: var(--faint);
    letter-spacing: 0.2px; margin: 0 2px 14px;
  }
  .chip-group { display: flex; flex-wrap: wrap; gap: 10px; }
  .chip {
    height: 50px; padding: 0 20px; border-radius: 14px;
    background: var(--raised); border: 1px solid var(--line); color: #fff;
    font-family: inherit; font-size: 15px; font-weight: 600; letter-spacing: -0.2px;
    cursor: pointer; display: flex; align-items: center;
    transition: background .15s ease, border-color .15s ease, transform .1s ease, color .15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .chip:hover { background: #22222c; }
  .chip:active { transform: scale(.96); }
  .chip.sel {
    background: rgba(255,0,122,0.12); border-color: var(--neon); color: #ff5fa6;
    box-shadow: 0 0 0 1px rgba(255,0,122,0.35), 0 0 20px -8px rgba(255,0,122,0.6);
  }

  /* ---------- bottom action zone ---------- */
  .lc-dock {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 30;
    padding: 22px 24px 30px;
    background: linear-gradient(180deg, rgba(11,11,15,0) 0%, rgba(11,11,15,0.85) 26%, var(--bg) 64%);
  }
  .save-btn {
    width: 100%; height: 60px; border-radius: 9999px; border: none;
    background: var(--neon); color: #fff; font-family: inherit;
    font-size: 17px; font-weight: 700; letter-spacing: -0.2px; cursor: pointer;
    box-shadow: 0 12px 36px rgba(255,0,122,0.45);
    transition: transform .14s ease, filter .2s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .save-btn:hover { filter: brightness(1.06); }
  .save-btn:active { transform: scale(.98); }

  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: .01ms !important; animation-duration: .01ms !important; }
  }
</style>
</head>
<body>
  <div id="stage"><div id="scaler"><div id="root"></div></div></div>

  <template id="__bundler_thumbnail">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
      <rect width="100" height="100" fill="#0B0B0F"/>
      <rect x="30" y="30" width="40" height="14" rx="4" fill="#1C1C24"/>
      <rect x="30" y="50" width="26" height="9" rx="4" fill="#FF007A"/>
      <rect x="60" y="50" width="10" height="9" rx="4" fill="#1C1C24"/>
      <rect x="30" y="64" width="40" height="9" rx="4" fill="#FF007A"/>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    const ChevDown = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6" /></svg>
    );

    const HOUSING = ['Renting', 'Owning', 'With Family', 'Dorm', 'Other'];
    const EMPLOYMENT = ['Full Time', 'Part Time', 'Self Employed', 'Student', 'Between Jobs'];

    function ChipGroup({ label, options, value, onPick }) {
      return (
        <div className="chip-block">
          <div className="chip-label">{label}</div>
          <div className="chip-group">
            {options.map((o) => (
              <button key={o} type="button"
                className={'chip' + (value === o ? ' sel' : '')}
                onClick={() => onPick(o)}>{o}</button>
            ))}
          </div>
        </div>
      );
    }

    function DropCard({ label, value }) {
      return (
        <button className="drop-card" type="button">
          <span className="drop-label">{label}</span>
          <span className="drop-value">{value}</span>
          <span className="drop-chev"><ChevDown /></span>
        </button>
      );
    }

    function LifeContext() {
      const [housing, setHousing] = useState('Renting');
      const [employment, setEmployment] = useState('Full Time');

      return (
        <div className="screen">
          <div className="lc-topbar">
            <BackChevron href="Am I Broke - HomeTabs.html" />
          </div>

          <div className="lc-scroll">
            <div className="lc-header">
              <h1>Life<br />Context</h1>
              <p>Tunes your score to your actual life — not some average.</p>
            </div>

            <div className="lc-fields">
              <DropCard label="State" value="Arizona" />
              <DropCard label="Birthday" value="Jun 15, 2001" />
            </div>

            <ChipGroup label="Housing" options={HOUSING} value={housing} onPick={setHousing} />
            <ChipGroup label="Employment" options={EMPLOYMENT} value={employment} onPick={setEmployment} />
          </div>

          <div className="lc-dock">
            <button className="save-btn" type="button">Save Changes</button>
          </div>
        </div>
      );
    }

    function App() {
      return (
        <IOSDevice dark>
          <LifeContext />
        </IOSDevice>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    function fit() {
      const W = 402, H = 874, pad = 36;
      const s = Math.min((window.innerWidth - pad) / W, (window.innerHeight - pad) / H, 1);
      document.getElementById('scaler').style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fit);
    fit();
  </script>
</body>
</html>
