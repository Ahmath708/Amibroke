<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Am I Broke? — Onboarding</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0B0B0F;
    --card: #16161F;
    --neon: #FF007A;
    --line: rgba(255,255,255,0.08);
    --text: #FFFFFF;
    --muted: rgba(255,255,255,0.50);
    --faint: rgba(255,255,255,0.30);
    /* ONE shared onboarding headline token — every screen's <h1> reads from
       these so the title size can never drift between form / money / story. */
    --ob-h-size: 38px;
    --ob-h-weight: 800;
    --ob-h-tracking: -1.6px;
    --ob-h-leading: 1.0;
    /* shared header sub-paragraph + the gap right after the heading */
    --ob-sub-gap: 14px;          /* margin between <h1> and the sub line */
    --ob-sub-size: 15px;
    --ob-sub-leading: 1.5;
    --ob-sub-color: rgba(255,255,255,0.6);
    --ob-pad-x: 24px;            /* shared horizontal screen padding */
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: radial-gradient(900px 600px at 50% -10%, #15151d 0%, #0a0a0d 55%, #07070a 100%);
    font-family: 'Geist', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #scaler { transform-origin: center center; }

  .screen {
    height: 100%; width: 100%; background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; position: relative; overflow: hidden;
    padding: 0 var(--ob-pad-x) 26px;
  }

  /* ---------- progress anchor ---------- */
  /* ---------- shared global progress ---------- */
  .progress {
    position: absolute; top: 54px; left: 0; right: 0; height: 3px;
    background: rgba(255,255,255,0.07); z-index: 5;
  }
  .progress .fill {
    height: 100%; width: 0; background: var(--neon);
    box-shadow: 0 0 10px rgba(255,0,122,0.7); border-radius: 0 3px 3px 0;
    transition: width .45s cubic-bezier(.22,1,.36,1);
  }
  /* ACT 1 — Instagram-Stories segmented bar */
  .progress.seg {
    background: transparent; display: flex; gap: 6px; padding: 0 14px; align-items: center;
  }
  .progress.seg .seg-bar {
    flex: 1; height: 3px; border-radius: 99px; background: rgba(255,255,255,0.13);
    overflow: hidden; position: relative;
  }
  .progress.seg .seg-fill {
    position: absolute; inset: 0; border-radius: 99px; transform-origin: left; transform: scaleX(0);
    background: var(--neon); box-shadow: 0 0 10px rgba(255,0,122,0.65);
  }
  .seg-bar.done .seg-fill { transform: scaleX(1); }
  .seg-bar.active .seg-fill { animation: segFill 9s linear forwards; }
  @keyframes segFill { from { transform: scaleX(0); } to { transform: scaleX(1); } }

  /* ---------- flow shell ---------- */
  .flow-root { position: relative; height: 100%; }

  /* ---------- stub placeholder screens ---------- */
  .screen.stub { padding-top: 78px; }
  .stub-center {
    flex: 1 1 auto; min-height: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 9px; text-align: center;
  }
  .stub-center::before {
    content: ''; width: 56px; height: 56px; border-radius: 16px; margin-bottom: 8px;
    border: 1px dashed rgba(255,255,255,0.18); background: rgba(255,255,255,0.02);
  }
  .stub-kicker {
    font-family: 'Geist Mono', monospace; font-size: 11px; font-weight: 600;
    letter-spacing: 2px; color: var(--neon); opacity: .9;
  }
  .stub-title {
    font-size: 26px; font-weight: 800; letter-spacing: -1px; color: #fff;
    max-width: 280px; text-wrap: balance; line-height: 1.05;
  }
  .stub-note {
    font-family: 'Geist Mono', monospace; font-size: 12.5px; font-weight: 500; color: var(--faint);
  }
  .stub-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 14px; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 6px; padding: 10px 4px;
    background: none; border: none; cursor: pointer; font-family: inherit;
    font-size: 15px; font-weight: 600; color: var(--muted); letter-spacing: -0.2px;
    transition: color .2s ease; -webkit-tap-highlight-color: transparent;
  }
  .back-btn:hover { color: #fff; }
  .back-btn:disabled { opacity: .3; cursor: not-allowed; }

  /* ---------- discreet dev jump (REMOVE before ship) ---------- */
  .devjump { position: absolute; top: 48px; right: 10px; z-index: 95; opacity: .45; transition: opacity .2s ease; }
  .devjump:hover { opacity: 1; }
  .devjump select {
    background: #16161F; color: #fff; border: 1px solid var(--line); border-radius: 8px;
    font-family: 'Geist Mono', monospace; font-size: 10px; padding: 3px 6px; cursor: pointer;
  }

  /* ---------- header ---------- */
  .header { padding-top: 78px; }
  .header h1 {
    margin: 0; font-size: var(--ob-h-size); font-weight: var(--ob-h-weight);
    letter-spacing: var(--ob-h-tracking); line-height: var(--ob-h-leading); color: #fff;
  }
  .header p {
    margin: var(--ob-sub-gap) 0 0; font-size: var(--ob-sub-size); line-height: var(--ob-sub-leading); color: var(--ob-sub-color);
    font-weight: 450; max-width: 320px; text-wrap: pretty;
    min-height: 4.5em; /* reserve 3 lines so the $ display holds a fixed position across money screens */
  }

  /* ---------- display ---------- */
  .display {
    flex: 1 1 auto; min-height: 0;
    display: flex; align-items: center;
    font-variant-numeric: tabular-nums;
  }
  .amount {
    font-size: 60px; font-weight: 700; letter-spacing: -2.5px; line-height: 1;
    color: #fff; display: inline-flex; align-items: center;
  }
  .amount.placeholder { color: rgba(255,255,255,0.22); }
  .caret {
    width: 3px; height: 52px; background: var(--neon); margin-left: 5px; border-radius: 2px;
    box-shadow: 0 0 8px rgba(255,0,122,0.7);
  }
  @media (prefers-reduced-motion: no-preference) {
    .caret { animation: blink 1.1s steps(1) infinite; }
  }
  @keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

  /* ---------- "not sure?" trigger ---------- */
  .not-sure {
    align-self: center; margin: 0 auto 14px; padding: 8px 6px;
    display: inline-flex; align-items: center; gap: 6px;
    background: none; border: none; cursor: pointer; font-family: inherit;
    font-size: 14px; font-weight: 500; color: var(--muted); letter-spacing: -0.1px;
    transition: color .2s ease, gap .2s ease; -webkit-tap-highlight-color: transparent;
  }
  .not-sure:hover { color: rgba(255,255,255,0.72); gap: 8px; }
  .not-sure .ns-chev { color: var(--faint); }

  /* ---------- range bottom sheet ---------- */
  .sheet-scrim {
    position: absolute; inset: 0; z-index: 20; background: rgba(7,7,10,0.55);
    backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px);
    opacity: 0; pointer-events: none; transition: opacity .3s ease;
  }
  .sheet-scrim.show { opacity: 1; pointer-events: auto; }
  .sheet {
    position: absolute; left: 0; right: 0; bottom: 0; z-index: 21;
    background: #14141c; border-top: 1px solid var(--line);
    border-radius: 28px 28px 0 0; padding: 12px 22px 30px;
    box-shadow: 0 -20px 50px -20px rgba(0,0,0,0.8);
    transform: translateY(100%); transition: transform .36s cubic-bezier(.22,1,.36,1);
  }
  .sheet.show { transform: translateY(0); }
  .grab { width: 38px; height: 4px; border-radius: 99px; background: rgba(255,255,255,0.18); margin: 0 auto 18px; }
  .sheet h2 { margin: 0 2px 16px; font-size: 22px; font-weight: 700; letter-spacing: -0.6px; color: #fff; }
  .range-list { display: flex; flex-direction: column; gap: 9px; }
  .range-row {
    height: 56px; border-radius: 15px; cursor: pointer; font-family: inherit;
    background: var(--card); border: 1px solid var(--line); color: #fff;
    font-size: 16px; font-weight: 600; letter-spacing: -0.2px;
    display: flex; align-items: center; justify-content: space-between; padding: 0 18px;
    transition: background .15s ease, border-color .15s ease, transform .1s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .range-row:hover { background: #1c1c26; }
  .range-row:active { transform: scale(.985); }
  .range-row.sel { border-color: var(--neon); background: rgba(255,0,122,0.12); color: var(--neon); }
  .range-row .tick { opacity: 0; color: var(--neon); transition: opacity .15s ease; }
  .range-row.sel .tick { opacity: 1; }

  /* ---------- keypad ---------- */
  .keypad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .key {
    height: 60px; border-radius: 18px; cursor: pointer; font-family: inherit;
    background: var(--card); border: 1px solid var(--line); color: #fff;
    font-size: 25px; font-weight: 500; letter-spacing: -0.5px;
    display: grid; place-items: center;
    transition: transform .1s ease, background .15s ease, border-color .15s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .key:hover { background: #1c1c26; }
  .key:active { transform: scale(.95); background: #24242f; border-color: rgba(255,0,122,0.4); }
  .key.fn { background: transparent; border-color: transparent; color: var(--muted); }
  .key.fn:hover { background: rgba(255,255,255,0.04); }
  .key.fn:active { background: rgba(255,255,255,0.06); border-color: transparent; }

  .kp-action { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
  .next-fab {
    width: 66px; height: 66px; border-radius: 50%; border: none; cursor: pointer;
    background: var(--neon); display: grid; place-items: center;
    box-shadow: 0 8px 28px rgba(255,0,122,0.5), inset 0 1px 0 rgba(255,255,255,0.25);
    transition: transform .15s cubic-bezier(.34,1.5,.6,1), opacity .25s ease, box-shadow .25s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .next-fab:active { transform: scale(.92); }
  .next-fab:disabled { opacity: .32; box-shadow: none; cursor: not-allowed; transform: none; }

  /* ============================================================
     STORY TEMPLATE (Act 1 — Scenes 1-3 share this)
     ============================================================ */
  .screen.story { display: flex; flex-direction: column; padding: 78px var(--ob-pad-x) 28px; }

  .story-top {
    flex: 1 1 auto; min-height: 0;
    display: flex; flex-direction: column; justify-content: center; gap: 30px;
  }
  .story-hero {
    flex: 0 0 auto;
    display: flex; align-items: center; justify-content: center;
  }
  @media (prefers-reduced-motion: no-preference) {
    .story-hero { animation: storyHeroIn .62s cubic-bezier(.22,1,.36,1) both; }
  }
  @keyframes storyHeroIn { from { opacity: 0; transform: translateY(16px) scale(.96); } to { opacity: 1; transform: none; } }

  .story-copy { position: relative; z-index: 1; }
  .story-copy h1 {
    margin: 0; font-size: var(--ob-h-size); font-weight: var(--ob-h-weight);
    letter-spacing: var(--ob-h-tracking); line-height: var(--ob-h-leading); color: #fff; text-wrap: balance;
  }
  .story-copy p {
    margin: var(--ob-sub-gap) 0 0; font-size: var(--ob-sub-size); line-height: var(--ob-sub-leading); color: var(--ob-sub-color);
    font-weight: 450; max-width: 312px; text-wrap: pretty;
  }
  @media (prefers-reduced-motion: no-preference) {
    .story-copy h1 { animation: storyTextIn .55s cubic-bezier(.22,1,.36,1) .06s both; }
    .story-copy p  { animation: storyTextIn .55s cubic-bezier(.22,1,.36,1) .15s both; }
  }
  @keyframes storyTextIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

  /* invisible Stories tap-zones */
  .tapzone { position: absolute; top: 64px; bottom: 112px; z-index: 10; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .tapzone.left  { left: 0; width: 33.33%; }
  .tapzone.right { right: 0; width: 66.66%; }

  /* persistent CTA */
  /* persistent bottom group: trust strip + CTA */
  .story-bottom { flex: 0 0 auto; position: relative; z-index: 20; }
  .story-trust {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    margin: 0 0 16px; font-size: 12px; font-weight: 500;
    color: rgba(255,255,255,0.42); letter-spacing: -0.1px; text-wrap: pretty;
  }
  .story-trust svg { color: rgba(255,255,255,0.5); flex-shrink: 0; }
  .story-cta {
    position: relative; z-index: 20;
    width: 100%; height: 58px; border-radius: 18px; border: none;
    background: var(--neon); color: #fff; font-family: inherit;
    font-size: 17px; font-weight: 700; letter-spacing: -0.3px; cursor: pointer;
    box-shadow: 0 10px 34px rgba(255,0,122,0.42);
    transition: transform .14s ease, filter .2s ease; -webkit-tap-highlight-color: transparent;
  }
  .story-cta:hover { filter: brightness(1.06); }
  .story-cta:active { transform: scale(.975); }

  /* ---- hero slot ---- */
  .hero { width: 300px; height: 252px; position: relative; }

  /* HERO · peel (Scene 1) */
  .peel-glow {
    position: absolute; inset: 6%; border-radius: 50%; filter: blur(10px);
    background: radial-gradient(closest-side, rgba(255,0,122,0.26), transparent 72%);
    opacity: 0; animation: peelGlow 1s ease 1.25s forwards;
  }
  @keyframes peelGlow { to { opacity: 1; } }
  .peel-card {
    position: absolute; left: 6px; right: 6px; top: 20px; bottom: 20px;
    border-radius: 24px; padding: 26px 26px 0; border: 1px solid var(--line);
    overflow: hidden;
  }
  .peel-card .lbl { font-size: 12.5px; font-weight: 600; color: var(--muted); letter-spacing: .2px; }
  .peel-card .val { margin-top: 10px; font-size: 39px; font-weight: 800; letter-spacing: -1.8px; font-family: 'Geist Mono', monospace; color: #fff; }
  .peel-truth { background: #111119; }
  .peel-truth .val .neg { color: var(--neon); }
  .peel-truth .sub { margin-top: 4px; font-size: 11px; font-weight: 600; color: var(--faint); letter-spacing: .2px; }
  .leak {
    position: absolute; bottom: 18px; width: 6px; height: 6px; border-radius: 50%;
    background: var(--neon); box-shadow: 0 0 8px var(--neon); opacity: 0;
  }
  .peel-comfort {
    background: linear-gradient(180deg, #20202b, #181820);
    transform-origin: 50% 100%; box-shadow: 0 22px 44px -18px rgba(0,0,0,.75);
    animation: peelAway 1.5s cubic-bezier(.55,0,.2,1) 1.15s forwards;
  }
  @keyframes peelAway {
    0%   { transform: perspective(950px) rotateX(0deg) translateY(0); opacity: 1; }
    55%  { opacity: 1; }
    100% { transform: perspective(950px) rotateX(-120deg) translateY(-30px); opacity: 0; }
  }
  @media (prefers-reduced-motion: no-preference) {
    .leak.l1 { left: 30%; animation: leakDrip 2.6s ease-in 2.4s infinite; }
    .leak.l2 { left: 50%; animation: leakDrip 2.6s ease-in 3.0s infinite; }
    .leak.l3 { left: 70%; animation: leakDrip 2.6s ease-in 3.6s infinite; }
  }
  @keyframes leakDrip {
    0%   { opacity: 0; transform: translateY(-28px) scale(.5); }
    22%  { opacity: 1; }
    80%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(6px) scale(.85); }
  }

  /* HERO · dial (Scene 2) — gauge-native “forming” sweep, never settles */
  .hero-dial { display: grid; place-items: center; }
  .hero-dial svg { display: block; }
  /* static fallback (reduced motion): a short partial arc from the top origin */
  .dial-sweep {
    transform-box: view-box; transform-origin: 100px 100px; transform: rotate(-90deg);
    stroke-dasharray: 110 515; opacity: 1;
  }
  .dial-comet {
    transform-box: view-box; transform-origin: 100px 100px; transform: rotate(77deg);
    opacity: 1;
  }
  @media (prefers-reduced-motion: no-preference) {
    .dial-sweep { animation: gaugeSweep 2.9s cubic-bezier(.45,0,.55,1) infinite; }
    .dial-comet { animation: cometLead 2.9s cubic-bezier(.45,0,.55,1) infinite; }
  }
  @keyframes gaugeSweep {
    0%   { stroke-dasharray: 0 515;   opacity: 0; }
    14%  { opacity: 1; }
    68%  { opacity: 1; }
    88%  { opacity: 0; }
    100% { stroke-dasharray: 360 515; opacity: 0; }
  }
  @keyframes cometLead {
    0%   { transform: rotate(0deg); opacity: 0; }
    14%  { opacity: 1; }
    68%  { opacity: 1; }
    88%  { opacity: 0; }
    100% { transform: rotate(252deg); opacity: 0; }
  }
  .dial-center {
    position: absolute; display: flex; flex-direction: column; align-items: center; line-height: 1;
  }
  .dial-center .dc-q { font-size: 50px; font-weight: 800; letter-spacing: -2px; color: #fff; }
  .dial-center .dc-d { margin-top: 5px; font-family: 'Geist Mono', monospace; font-size: 13px; font-weight: 600; color: var(--faint); }

  /* HERO · bloom (Scene 3) */
  .hero-bloom { display: flex; align-items: flex-end; justify-content: center; gap: 13px; height: 100%; padding-bottom: 8px; position: relative; }
  .bloom-glow {
    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 220px; height: 130px; border-radius: 50%; filter: blur(10px);
    background: radial-gradient(closest-side, rgba(255,0,122,0.20), transparent 72%);
  }
  .bloom-bar {
    width: 26px; border-radius: 8px 8px 2px 2px; transform-origin: bottom;
    background: linear-gradient(180deg, #FF2E9A, rgba(255,0,122,0.42));
    box-shadow: 0 0 14px -7px rgba(255,0,122,0.55); position: relative;
    animation: barRise .9s cubic-bezier(.22,1,.36,1) both;
  }
  @keyframes barRise { from { transform: scaleY(0); } to { transform: scaleY(1); } }

  /* ============================================================
     FORM CHROME (Act 2 · Steps 1-3 share this template)
     top progress (shared) → header → content → footer, keyboard-aware
     ============================================================ */
  .screen.form { display: flex; flex-direction: column; padding: 78px var(--ob-pad-x) 26px; }
  .form-header { flex: 0 0 auto; }
  .form-header h1 { margin: 0; font-size: var(--ob-h-size); font-weight: var(--ob-h-weight); letter-spacing: var(--ob-h-tracking); line-height: var(--ob-h-leading); color: #fff; text-wrap: balance; }
  .form-header p { margin: var(--ob-sub-gap) 0 0; font-size: var(--ob-sub-size); line-height: var(--ob-sub-leading); color: var(--ob-sub-color); font-weight: 450; }
  .form-content { flex: 1 1 auto; overflow-y: auto; padding-top: 30px; min-height: 0; }
  .form-content::-webkit-scrollbar { width: 0; }
  .form-dock { flex: 0 0 auto; }
  .cta-primary {
    width: 100%; height: 58px; border-radius: 18px; border: none;
    background: var(--neon); color: #fff; font-family: inherit;
    font-size: 17px; font-weight: 700; letter-spacing: -0.3px; cursor: pointer;
    box-shadow: 0 10px 34px rgba(255,0,122,0.42);
    transition: transform .14s ease, filter .2s ease, opacity .3s ease, box-shadow .3s ease;
    -webkit-tap-highlight-color: transparent;
  }
  .cta-primary:hover:not(:disabled) { filter: brightness(1.06); }
  .cta-primary:active:not(:disabled) { transform: scale(.975); }
  .cta-primary:disabled { opacity: .4; box-shadow: none; cursor: not-allowed; }
  .form-back { display: flex; justify-content: center; margin-top: 12px; }

  /* shared premium input */
  .ofield { position: relative; height: 60px; background: var(--card); border: 1px solid var(--line); border-radius: 16px; transition: border-color .25s, box-shadow .25s, background .25s; }
  .ofield + .ofield { margin-top: 12px; }
  .ofield.focused { border-color: var(--neon); box-shadow: 0 0 0 3px rgba(255,0,122,0.16), 0 0 22px rgba(255,0,122,0.30); background: #181822; }
  .ofield.focused.ok { border-color: var(--neon); }
  .ofield input { position: absolute; left: 17px; right: 17px; top: 28px; bottom: 9px; background: transparent; border: none; outline: none; color: #fff; font-family: inherit; font-size: 16px; font-weight: 500; letter-spacing: -0.2px; width: calc(100% - 34px); padding: 0; }
  .ofield input::placeholder { color: rgba(255,255,255,0.22); }
  .oflabel { position: absolute; left: 17px; top: 50%; transform: translateY(-50%) scale(1); transform-origin: left center; font-size: 16px; font-weight: 500; color: var(--muted); pointer-events: none; letter-spacing: -0.2px; transition: top .2s cubic-bezier(.4,0,.2,1), transform .2s cubic-bezier(.4,0,.2,1), color .2s ease; }
  .ofield.active .oflabel { top: 9px; transform: translateY(0) scale(0.75); color: var(--faint); font-weight: 600; }
  .ofield.active.focused .oflabel { color: var(--neon); }
  /* username @-prefix + live status */
  .ofield.has-status input { right: 46px; width: calc(100% - 17px - 46px); }
  .ofield.has-prefix.active input { left: 32px; }
  .ofield.has-prefix.has-status.active input { width: calc(100% - 32px - 46px); }
  .at-prefix { position: absolute; left: 17px; top: 28px; bottom: 9px; display: flex; align-items: center; font-size: 16px; font-weight: 500; color: var(--muted); opacity: 0; transition: opacity .2s ease; pointer-events: none; }
  .ofield.has-prefix.active .at-prefix { opacity: 1; }
  .status-ind { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 22px; height: 22px; display: grid; place-items: center; color: var(--neon); }
  .status-ind.taken { color: rgba(255,255,255,0.4); }
  .mini-spin { width: 17px; height: 17px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2); border-top-color: var(--neon); animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .field-note { margin: 11px 4px 0; font-size: 12px; line-height: 1.45; color: var(--faint); font-weight: 450; text-wrap: pretty; }
  .field-note.taken { color: rgba(255,255,255,0.55); }

  /* tap-to-open picker field (State / Birthday) */
  .ofield.tappable { width: 100%; text-align: left; cursor: pointer; font-family: inherit; padding: 0; -webkit-tap-highlight-color: transparent; }
  .ofield-val { position: absolute; left: 17px; right: 42px; top: 28px; bottom: 9px; display: flex; align-items: center; font-size: 16px; font-weight: 500; color: #fff; letter-spacing: -0.2px; }
  .ofield-val.ph { color: rgba(255,255,255,0.3); }
  .ofield-chev { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--faint); display: flex; }

  /* searchable state sheet (tall) */
  .sheet.tall { top: 78px; display: flex; flex-direction: column; padding: 12px 0 0; }
  .sheet.tall .grab { flex: 0 0 auto; }
  .sheet-search-wrap { flex: 0 0 auto; padding: 4px 20px 14px; }
  .sheet-search { width: 100%; height: 50px; border-radius: 14px; background: var(--card); border: 1px solid var(--line); color: #fff; font-family: inherit; font-size: 16px; padding: 0 16px; outline: none; transition: border-color .2s, box-shadow .2s; }
  .sheet-search:focus { border-color: var(--neon); box-shadow: 0 0 0 3px rgba(255,0,122,0.16); }
  .sheet-search::placeholder { color: rgba(255,255,255,0.3); }
  .state-list { flex: 1 1 auto; overflow-y: auto; padding: 0 20px 8px; display: flex; flex-direction: column; gap: 6px; min-height: 0; }
  .state-list::-webkit-scrollbar { width: 0; }
  .state-row { height: 52px; flex: 0 0 auto; border-radius: 13px; background: transparent; border: 1px solid transparent; color: #fff; font-family: inherit; font-size: 16px; font-weight: 600; text-align: left; padding: 0 16px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; -webkit-tap-highlight-color: transparent; }
  .state-row:hover { background: var(--card); }
  .state-row.sel { background: rgba(255,0,122,0.12); border-color: var(--neon); color: var(--neon); }
  .state-row .tick { color: var(--neon); }
  .state-empty { padding: 26px; text-align: center; color: var(--faint); font-size: 14px; }

  /* birthday wheels */
  .wheels { display: flex; gap: 8px; position: relative; height: 190px; margin: 8px 0 18px; }
  .wheel-band { position: absolute; left: 0; right: 0; top: 76px; height: 38px; border-radius: 11px; background: rgba(255,255,255,0.04); border: 1px solid var(--line); pointer-events: none; }
  .wheel { flex: 1; height: 190px; overflow-y: auto; scroll-snap-type: y mandatory; text-align: center; }
  .wheel::-webkit-scrollbar { width: 0; }
  .wheel-item { height: 38px; line-height: 38px; scroll-snap-align: center; font-size: 18px; font-weight: 600; color: rgba(255,255,255,0.32); transition: color .15s ease; font-variant-numeric: tabular-nums; }
  .wheel-item.on { color: #fff; }
  .date-set { width: 100%; height: 54px; border-radius: 16px; border: none; background: var(--neon); color: #fff; font-family: inherit; font-size: 16px; font-weight: 700; letter-spacing: -0.2px; cursor: pointer; box-shadow: 0 8px 26px rgba(255,0,122,0.4); transition: transform .14s, filter .2s; -webkit-tap-highlight-color: transparent; }
  .date-set:hover { filter: brightness(1.06); }
  .date-set:active { transform: scale(.985); }

  /* chip groups (Setup — Housing / Employment) */
  .chip-block + .chip-block { margin-top: 28px; }
  .chip-label { font-size: 12px; font-weight: 600; color: var(--faint); letter-spacing: 0.2px; margin: 0 2px 13px; }
  .chip-group { display: flex; flex-wrap: wrap; gap: 10px; }
  .chip { height: 50px; padding: 0 20px; border-radius: 14px; background: var(--card); border: 1px solid var(--line); color: #fff; font-family: inherit; font-size: 15px; font-weight: 600; letter-spacing: -0.2px; cursor: pointer; display: flex; align-items: center; transition: background .15s ease, border-color .15s ease, transform .1s ease; -webkit-tap-highlight-color: transparent; }
  .chip:hover { background: #1c1c26; }
  .chip:active { transform: scale(.96); }
  .chip.sel { background: rgba(255,0,122,0.12); border-color: var(--neon); color: var(--neon); }

  /* ============================================================
     LOADING / CALCULATING (Act 3) — forming-score climax, loops
     ============================================================ */
  .screen.loading { display: flex; flex-direction: column; align-items: center; padding: 64px 24px 28px; }
  .load-gauge { position: relative; width: 256px; height: 256px; display: grid; place-items: center; flex: 0 0 auto; }
  .load-gauge::before {
    content: ''; position: absolute; width: 210px; height: 210px; border-radius: 50%;
    background: radial-gradient(closest-side, rgba(255,0,122,0.18), transparent 70%); filter: blur(8px);
  }
  .load-gauge svg { display: block; }
  .load-sweep { transform-box: view-box; transform-origin: 100px 100px; transform: rotate(-90deg); transition: stroke-dasharray .13s linear; }
  .load-comet { transform-box: view-box; transform-origin: 100px 100px; transition: transform .13s linear; }
  .load-center { position: absolute; display: flex; flex-direction: column; align-items: center; line-height: 1; }
  .load-num { font-size: 76px; font-weight: 800; letter-spacing: -3px; color: #fff; font-variant-numeric: tabular-nums; }
  .load-den { margin-top: 6px; font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 600; color: var(--faint); }
  .load-copy { margin-top: 22px; font-size: 16px; font-weight: 600; color: rgba(255,255,255,0.62); letter-spacing: -0.2px; text-align: center; min-height: 22px; max-width: 300px; text-wrap: balance; flex: 0 0 auto; }
  @media (prefers-reduced-motion: no-preference) {
    .load-gauge::before { animation: loadPulse 1.8s ease-in-out infinite; }
    .load-gauge { animation: loadIn .6s cubic-bezier(.22,1,.36,1) both; }
    .load-copy { animation: loadIn .6s cubic-bezier(.22,1,.36,1) .1s both; }
  }
  @keyframes loadPulse { 0%, 100% { opacity: .55; transform: scale(.96); } 50% { opacity: 1; transform: scale(1.05); } }
  @keyframes loadIn { from { opacity: 0; transform: translateY(10px) scale(.97); } to { opacity: 1; transform: none; } }

  /* ============================================================
     REVEAL — Score + Snapshot (Act 3 finale). Semantic band colors.
     ============================================================ */
  .screen.reveal { display: flex; flex-direction: column; align-items: center; padding: 64px 24px 28px; overflow-y: auto; }
  .screen.reveal::-webkit-scrollbar { width: 0; }
  .reveal-eyebrow { font-size: 13px; font-weight: 600; color: var(--muted); letter-spacing: 0.3px; margin-bottom: 12px; flex: 0 0 auto; }
  .reveal-gauge { position: relative; width: 256px; height: 256px; display: grid; place-items: center; flex: 0 0 auto; }
  .reveal-glow { position: absolute; width: 210px; height: 210px; border-radius: 50%; filter: blur(11px); pointer-events: none; }
  .reveal-gauge svg { display: block; }
  .reveal-center { position: absolute; display: flex; flex-direction: column; align-items: center; line-height: 1; }
  .reveal-score { font-size: 76px; font-weight: 800; letter-spacing: -3px; color: #fff; font-variant-numeric: tabular-nums; }
  .reveal-den { margin-top: 6px; font-family: 'Geist Mono', monospace; font-size: 14px; font-weight: 600; color: var(--faint); }
  .reveal-band { margin-top: 22px; font-size: 25px; font-weight: 800; letter-spacing: -0.6px; text-align: center; flex: 0 0 auto; }
  .reveal-react { margin-top: 8px; font-size: 15px; font-weight: 500; color: rgba(255,255,255,0.62); text-align: center; text-wrap: balance; flex: 0 0 auto; }
  .snapshot { margin-top: 28px; width: 100%; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; flex: 0 0 auto; }
  .snap-cell { background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 14px 8px 13px; text-align: center; }
  .snap-label { font-size: 11px; font-weight: 600; color: var(--faint); letter-spacing: 0.3px; }
  .snap-val { margin-top: 8px; font-size: 17px; font-weight: 800; letter-spacing: -0.6px; font-family: 'Geist Mono', monospace; color: #fff; }
  .reveal-note { margin-top: 18px; font-size: 12.5px; line-height: 1.45; color: rgba(255,255,255,0.52); text-align: center; max-width: 300px; text-wrap: pretty; flex: 0 0 auto; }
  .reveal-comet { transition: opacity .55s ease .15s; }
  .reveal-cta { margin-top: 22px; width: 100%; height: 58px; border-radius: 18px; border: none; background: var(--neon); color: #fff; font-family: inherit; font-size: 17px; font-weight: 700; letter-spacing: -0.3px; cursor: pointer; box-shadow: 0 10px 34px rgba(255,0,122,0.42); transition: transform .14s ease, filter .2s ease; -webkit-tap-highlight-color: transparent; text-decoration: none; display: flex; align-items: center; justify-content: center; flex: 0 0 auto; }
  .reveal-cta:hover { filter: brightness(1.06); }
  .reveal-cta:active { transform: scale(.975); }
  @media (prefers-reduced-motion: no-preference) {
    .reveal-band { animation: loadIn .5s cubic-bezier(.22,1,.36,1) .7s both; }
    .reveal-react { animation: loadIn .5s cubic-bezier(.22,1,.36,1) .82s both; }
    .snapshot { animation: loadIn .5s cubic-bezier(.22,1,.36,1) .96s both; }
    .reveal-note { animation: loadIn .5s cubic-bezier(.22,1,.36,1) 1.08s both; }
    .reveal-cta { animation: loadIn .5s cubic-bezier(.22,1,.36,1) 1.18s both; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: .01ms !important; animation-duration: .01ms !important; }
  }
</style>

<body>
  <div id="stage"><div id="scaler"><div id="root"></div></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>

  <script type="text/babel">
    const { useState } = React;

    const BackIcon = () => (
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
        <path d="M9 5h10a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H9l-6.5-6.5a1 1 0 0 1 0-1.4z" />
        <path d="M16.5 9.5l-5 5M11.5 9.5l5 5" />
      </svg>
    );
    const ArrowIcon = () => (
      <svg width="27" height="27" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round">
        <path d="M4 12h15" /><path d="M13 6l6 6-6 6" />
      </svg>
    );
    const LeftArrow = () => (
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M20 12H5" /><path d="M11 6l-6 6 6 6" />
      </svg>
    );
    const LockIcon = () => (
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
        <rect x="4.5" y="10.5" width="15" height="10" rx="2.2" />
        <path d="M8 10.5V7.5a4 4 0 0 1 8 0v3" />
      </svg>
    );
    const ChevR = () => (
      <svg className="ns-chev" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round">
        <path d="M9 6l6 6-6 6" />
      </svg>
    );
    const TickIcon = () => (
      <svg className="tick" width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round">
        <path d="M4 12.5l5 5L20 6.5" />
      </svg>
    );

    /* Reusable "Not sure? Pick a range" fallback. Reused on income/savings
       with a different `options` list. Reports the chosen label up via onPick. */
    function RangeFallback({ options, selected, onPick, title }) {
      const [open, setOpen] = useState(false);
      const choose = (label) => { onPick(label); setOpen(false); };
      return (
        <React.Fragment>
          <button className="not-sure" type="button" onClick={() => setOpen(true)}>
            Not sure? Pick a range <ChevR />
          </button>

          <div className={'sheet-scrim' + (open ? ' show' : '')} onClick={() => setOpen(false)} />
          <div className={'sheet' + (open ? ' show' : '')} role="dialog" aria-label="Pick a range">
            <div className="grab" />
            <h2>{title}</h2>
            <div className="range-list">
              {options.map((opt) => (
                <button key={opt} type="button"
                  className={'range-row' + (selected === opt ? ' sel' : '')}
                  onClick={() => choose(opt)}>
                  <span>{opt}</span><TickIcon />
                </button>
              ))}
            </div>
          </div>
        </React.Fragment>
      );
    }

    const DEBT_RANGES = ['None', 'Under $5k', '$5k\u2013$15k', '$15k\u2013$50k', '$50k+'];
    const INCOME_RANGES = ['None', 'Under $2k', '$2k\u2013$4k', '$4k\u2013$6k', '$6k\u2013$10k', '$10k+'];
    const SAVINGS_RANGES = ['None', 'Under $500', '$500\u2013$2k', '$2k\u2013$10k', '$10k\u2013$50k', '$50k+'];

    const EXPENSES_RANGES = ['Under $2k', '$2k–$4k', '$4k–$6k', '$6k–$10k', '$10k+'];

    function format(raw) {
      if (raw === '') return '$0';
      let [intp, dec] = raw.split('.');
      intp = intp.replace(/^0+(?=\d)/, '');
      if (intp === '') intp = '0';
      const grouped = Number(intp).toLocaleString('en-US');
      return '$' + grouped + (raw.indexOf('.') !== -1 ? '.' + (dec || '') : '');
    }

    /* ============================================================
       SCREEN · Money entry (reusable) — Debt (5/6) & Income (4/6).
       Giant display + numeric keypad + “Pick a range” fallback.
       ============================================================ */
    function MoneyScreen({ headline, sub, ranges, sheetTitle, field, patch, onNext, onBack }) {
      const [raw, setRaw] = useState('');
      const [range, setRange] = useState(null);

      const press = (k) => {
        if (range !== null) setRange(null); // keypad wins back the display
        setRaw((cur) => {
          if (k === 'back') return cur.slice(0, -1);
          if (k === '.') {
            if (cur.indexOf('.') !== -1) return cur;
            return cur === '' ? '0.' : cur + '.';
          }
          // digit
          const dot = cur.indexOf('.');
          if (dot !== -1 && cur.length - dot > 2) return cur; // max 2 decimals
          if (cur === '0') return k; // replace lone leading zero
          if (cur.replace('.', '').length >= 12) return cur; // sane cap
          return cur + k;
        });
      };

      const keys = ['1','2','3','4','5','6','7','8','9','.','0','back'];
      const typed = raw !== '' && raw !== '.';
      const hasValue = typed || range !== null;
      const displayText = range !== null ? range : format(raw);
      const isPlaceholder = range === null && raw === '';

      return (
        <div className="screen">
          <div className="header">
            <h1>{headline}</h1>
            <p>{sub}</p>
          </div>

          <div className="display">
            <span className={'amount' + (isPlaceholder ? ' placeholder' : '')}>
              {displayText}
              {typed && <span className="caret" />}
            </span>
          </div>

          <RangeFallback options={ranges} selected={range} title={sheetTitle}
            onPick={(label) => {
              if (label === 'None') { setRange(null); setRaw('0'); } // treat "None" as a typed $0
              else { setRaw(''); setRange(label); }
            }} />

          <div className="keypad">
            {keys.map((k) => (
              <button key={k} type="button"
                className={'key' + (k === 'back' ? ' fn' : '')}
                onClick={() => press(k)}
                aria-label={k === 'back' ? 'Delete' : k}>
                {k === 'back' ? <BackIcon /> : k}
              </button>
            ))}
          </div>

          <div className="kp-action stub-nav">
            <button className="back-btn" type="button" onClick={onBack}>
              <LeftArrow /> Back
            </button>
            <button className="next-fab" type="button" disabled={!hasValue} aria-label="Next"
              onClick={() => { if (patch && field) patch({ [field]: displayText }); onNext(); }}>
              <ArrowIcon />
            </button>
          </div>
        </div>
      );
    }

    /* ============================================================
       SHELL · navigable 11-screen onboarding skeleton.
       Each slot below is independently replaceable — swap a STUB
       for a finished screen without touching its neighbors.
       ============================================================ */
    const SCREENS = [
      // ACT 1 — STORY (3-segment Stories bar)
      { id: 'story1',  act: 1, scene: 0, title: 'Story \u00b7 Scene 1 (peel)' },
      { id: 'story2',  act: 1, scene: 1, title: 'Story \u00b7 Scene 2 (dial)' },
      { id: 'story3',  act: 1, scene: 2, title: 'Story \u00b7 Scene 3 (bloom)' },
      // ACT 2 — BUILD (continuous fill, step / 7)
      { id: 'name',     act: 2, step: 1, title: 'Name & Username' },
      { id: 'location', act: 2, step: 2, title: 'Location \u2014 State & DOB' },
      { id: 'setup',    act: 2, step: 3, title: 'Setup \u2014 Housing & Employment' },
      { id: 'income',   act: 2, step: 4, title: 'Income' },
      { id: 'expenses', act: 2, step: 5, title: 'Expenses' },
      { id: 'debt',     act: 2, step: 6, title: 'Debt', keep: true },
      { id: 'savings',  act: 2, step: 7, title: 'Savings' },
      // FINISH (no progress bar)
      { id: 'loading',  act: 3, title: 'Loading / Calculating' },
      { id: 'reveal',   act: 3, title: 'Reveal \u2014 Score & Card' },
    ];

    function GlobalProgress({ meta }) {
      if (meta.act === 1) {
        return (
          <div className="progress seg">
            {[0, 1, 2].map((i) => {
              const state = i < meta.scene ? 'done' : i === meta.scene ? 'active' : 'future';
              return (
                <span key={i + '-' + meta.scene} className={'seg-bar ' + state}>
                  <span className="seg-fill" />
                </span>
              );
            })}
          </div>
        );
      }
      if (meta.act === 2) {
        return <div className="progress"><div className="fill" style={{ width: (meta.step / 7 * 100) + '%' }} /></div>;
      }
      return null; // Act 3 — no progress bar
    }

    /* ============================================================
       SCREEN · Story (Act 1 · Scenes 1-3) — reusable template.
       Scene 1 is the concrete example; 2 & 3 inherit layout,
       progress, transitions — only hero + copy differ.
       ============================================================ */
    function HeroPeel() {
      return (
        <div className="hero hero-peel">
          <div className="peel-glow" />
          <div className="peel-card peel-truth">
            <div className="lbl">What you actually owe</div>
            <div className="val"><span className="neg">−$9,800</span></div>
            <div className="sub">leaking $214/mo in interest</div>
            <span className="leak l1" /><span className="leak l2" /><span className="leak l3" />
          </div>
          <div className="peel-card peel-comfort">
            <div className="lbl">Checking balance</div>
            <div className="val">$2,847.00</div>
          </div>
        </div>
      );
    }

    function HeroDial() {
      const C = 2 * Math.PI * 82; // \u2248 515
      return (
        <div className="hero hero-dial">
          <svg width="226" height="226" viewBox="0 0 200 200">
            <defs>
              <filter id="dglow" x="-40%" y="-40%" width="180%" height="180%">
                <feGaussianBlur stdDeviation="3.4" result="b" />
                <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
              </filter>
            </defs>
            <circle cx="100" cy="100" r="82" fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="9" />
            <circle className="dial-sweep" cx="100" cy="100" r="82" fill="none"
              stroke="#FF007A" strokeWidth="9" strokeLinecap="round" filter="url(#dglow)" />
            <circle className="dial-comet" cx="100" cy="18" r="6" fill="#fff" filter="url(#dglow)" />
          </svg>
          <div className="dial-center">
            <span className="dc-q">?</span>
            <span className="dc-d">/100</span>
          </div>
        </div>
      );
    }

    function HeroBloom() {
      const bars = [50, 86, 124, 164, 210];
      return (
        <div className="hero hero-bloom">
          <div className="bloom-glow" />
          {bars.map((h, i) => (
            <span key={i} className="bloom-bar"
              style={{ height: h + 'px', animationDelay: (0.15 + i * 0.12) + 's' }} />
          ))}
        </div>
      );
    }

    const STORY = [
      { hero: 'peel',  h: 'Your bank app shows balances.',  s: 'It hides the truth \u2014 what you owe, and where it\u2019s quietly going.' },
      { hero: 'dial',  h: 'We turn it into one number.',     s: 'Everything you earn, owe, and waste \u2014 distilled into a single 0\u2013100 score.' },
      { hero: 'bloom', h: 'And we don\u2019t sugarcoat it.',  s: 'Answer honestly and watch your real score build. Brutal, but yours.' },
    ];

    const STORY_SECS = 9;

    function StoryScene({ scene, onAdvance, onBack, onGetStarted }) {
      const data = STORY[scene];
      React.useEffect(() => {
        const t = setTimeout(onAdvance, STORY_SECS * 1000);
        return () => clearTimeout(t);
      }, [scene]); // re-arm on every scene
      const Hero = data.hero === 'peel' ? HeroPeel : data.hero === 'dial' ? HeroDial : HeroBloom;
      return (
        <div className="screen story">
          <div className="story-top">
            <div className="story-hero" key={'h' + scene}><Hero /></div>
            <div className="story-copy" key={'c' + scene}>
              <h1>{data.h}</h1>
              <p>{data.s}</p>
            </div>
          </div>
          {/* invisible Stories tap-zones (hook into shell nav) */}
          <div className="tapzone left" onClick={onBack} aria-label="Back a scene" />
          <div className="tapzone right" onClick={onAdvance} aria-label="Skip ahead" />
          {/* shared chrome: trust strip + persistent CTA */}
          <div className="story-bottom">
            <div className="story-trust">
              <LockIcon /> No bank login · Private & encrypted · Delete anytime
            </div>
            <button className="story-cta" type="button" onClick={onGetStarted}>Build my score →</button>
          </div>
        </div>
      );
    }

    /* ============================================================
       FORM CHROME template + SCREEN · Name & Username (Act 2 · 1/6)
       ============================================================ */
    const CheckSm = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.6" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12.5l5 5L20 6.5" /></svg>
    );
    const XSm = () => (
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round" strokeLinejoin="round"><path d="M6 6l12 12M18 6L6 18" /></svg>
    );

    function FormChrome({ headline, sub, children, overlays, canContinue, onContinue, onBack, keyboardOpen }) {
      return (
        <div className="screen form">
          <div className="form-header">
            <h1>{headline}</h1>
            <p>{sub}</p>
          </div>
          <div className="form-content">{children}</div>
          <div className="form-dock">
            <div className="stub-nav">
              <button className="back-btn" type="button" onClick={onBack}><LeftArrow /> Back</button>
              <button className="next-fab" type="button" disabled={!canContinue} onClick={onContinue} aria-label="Continue"><ArrowIcon /></button>
            </div>
            {keyboardOpen && (
              <div onMouseDown={(e) => e.preventDefault()} style={{ marginTop: 14, marginLeft: -24, marginRight: -24, marginBottom: -26 }}>
                <IOSKeyboard dark />
              </div>
            )}
          </div>
          {overlays}
        </div>
      );
    }

    const TAKEN_HANDLES = ['admin', 'broke', 'maya', 'money', 'test', 'sarah', 'user'];

    function NameScreen({ profile, patch, onContinue, onBack }) {
      const [status, setStatus] = useState('idle'); // idle | checking | available | taken
      const [focusKey, setFocusKey] = useState(null);
      const user = profile.user;

      React.useEffect(() => {
        const u = user.trim().toLowerCase();
        if (u.length < 3) { setStatus('idle'); return; }
        setStatus('checking');
        const t = setTimeout(() => setStatus(TAKEN_HANDLES.includes(u) ? 'taken' : 'available'), 700);
        return () => clearTimeout(t);
      }, [user]);

      const canContinue = !!(profile.first.trim() && profile.last.trim() && status === 'available');
      const onF = (k) => () => setFocusKey(k);
      const onB = () => setFocusKey(null);

      return (
        <FormChrome headline="What do we call you?" sub="So the roast hits personal."
          canContinue={canContinue} onContinue={onContinue} onBack={onBack}
          keyboardOpen={focusKey !== null}>
          <div className={'ofield' + (focusKey === 'first' ? ' focused' : '') + ((focusKey === 'first' || profile.first) ? ' active' : '')}>
            <label className="oflabel">First name</label>
            <input type="text" autoComplete="given-name" value={profile.first}
              onChange={(e) => patch({ first: e.target.value })} onFocus={onF('first')} onBlur={onB} />
          </div>
          <div className={'ofield' + (focusKey === 'last' ? ' focused' : '') + ((focusKey === 'last' || profile.last) ? ' active' : '')}>
            <label className="oflabel">Last name</label>
            <input type="text" autoComplete="family-name" value={profile.last}
              onChange={(e) => patch({ last: e.target.value })} onFocus={onF('last')} onBlur={onB} />
          </div>
          <div className={'ofield has-prefix has-status' + (focusKey === 'user' ? ' focused' : '') + ((focusKey === 'user' || user) ? ' active' : '') + (status === 'available' ? ' ok' : '')}>
            <label className="oflabel">Username</label>
            <span className="at-prefix">@</span>
            <input type="text" autoCapitalize="none" autoCorrect="off" value={user}
              onChange={(e) => patch({ user: e.target.value.toLowerCase().replace(/[^a-z0-9_]/g, '').slice(0, 20) })}
              onFocus={onF('user')} onBlur={onB} />
            <span className={'status-ind' + (status === 'taken' ? ' taken' : '')}>
              {status === 'checking' && <span className="mini-spin" />}
              {status === 'available' && <CheckSm />}
              {status === 'taken' && <XSm />}
            </span>
          </div>
          {status === 'taken'
            ? <div className="field-note taken">That handle’s taken — try another.</div>
            : <div className="field-note">Your public @handle — other members see it when you share a roast.</div>}
        </FormChrome>
      );
    }

    /* ---- SCREEN · Location & Birthday (Act 2 · 2/6) ---- */
    const ChevDown = () => (
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9l6 6 6-6" /></svg>
    );
    const US_STATES = [
      ['Alabama','AL'],['Alaska','AK'],['Arizona','AZ'],['Arkansas','AR'],['California','CA'],
      ['Colorado','CO'],['Connecticut','CT'],['Delaware','DE'],['District of Columbia','DC'],
      ['Florida','FL'],['Georgia','GA'],['Hawaii','HI'],['Idaho','ID'],['Illinois','IL'],
      ['Indiana','IN'],['Iowa','IA'],['Kansas','KS'],['Kentucky','KY'],['Louisiana','LA'],
      ['Maine','ME'],['Maryland','MD'],['Massachusetts','MA'],['Michigan','MI'],['Minnesota','MN'],
      ['Mississippi','MS'],['Missouri','MO'],['Montana','MT'],['Nebraska','NE'],['Nevada','NV'],
      ['New Hampshire','NH'],['New Jersey','NJ'],['New Mexico','NM'],['New York','NY'],
      ['North Carolina','NC'],['North Dakota','ND'],['Ohio','OH'],['Oklahoma','OK'],['Oregon','OR'],
      ['Pennsylvania','PA'],['Rhode Island','RI'],['South Carolina','SC'],['South Dakota','SD'],
      ['Tennessee','TN'],['Texas','TX'],['Utah','UT'],['Vermont','VT'],['Virginia','VA'],
      ['Washington','WA'],['West Virginia','WV'],['Wisconsin','WI'],['Wyoming','WY'],
    ];
    const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

    function Wheel({ items, index, setIndex, open }) {
      const ref = React.useRef(null);
      const ITEM = 38;
      React.useEffect(() => { if (open && ref.current) ref.current.scrollTop = index * ITEM; }, [open]);
      const onScroll = () => {
        if (!ref.current) return;
        const i = Math.max(0, Math.min(items.length - 1, Math.round(ref.current.scrollTop / ITEM)));
        if (i !== index) setIndex(i);
      };
      return (
        <div className="wheel" ref={ref} onScroll={onScroll}>
          <div style={{ height: 76 }} />
          {items.map((it, i) => (<div key={i} className={'wheel-item' + (i === index ? ' on' : '')}>{it}</div>))}
          <div style={{ height: 76 }} />
        </div>
      );
    }

    function DateSheet({ open, onClose, onSet }) {
      const NOW = new Date();
      const maxYear = NOW.getFullYear() - 18; // 18+ age gate
      const years = []; for (let y = maxYear; y >= maxYear - 82; y--) years.push(y);
      const [mi, setMi] = useState(NOW.getMonth());
      const [di, setDi] = useState(14); // day 15
      const [yi, setYi] = useState(Math.max(0, years.indexOf(NOW.getFullYear() - 25)));
      const days = Array.from({ length: 31 }, (_, i) => i + 1);
      const confirm = () => {
        const year = years[yi], month = mi;
        const dim = new Date(year, month + 1, 0).getDate();
        const day = Math.min(di + 1, dim);
        let date = new Date(year, month, day);
        const max = new Date(NOW.getFullYear() - 18, NOW.getMonth(), NOW.getDate());
        if (date > max) date = max; // hard 18+ clamp
        onSet(date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }));
      };
      return (
        <React.Fragment>
          <div className={'sheet-scrim' + (open ? ' show' : '')} onClick={onClose} />
          <div className={'sheet' + (open ? ' show' : '')} role="dialog" aria-label="Birthday">
            <div className="grab" />
            <h2>When’s your birthday?</h2>
            <div className="wheels">
              <div className="wheel-band" />
              <Wheel items={MONTHS} index={mi} setIndex={setMi} open={open} />
              <Wheel items={days} index={di} setIndex={setDi} open={open} />
              <Wheel items={years} index={yi} setIndex={setYi} open={open} />
            </div>
            <button className="date-set" type="button" onClick={confirm}>Set birthday</button>
          </div>
        </React.Fragment>
      );
    }

    function LocationScreen({ profile, patch, onContinue, onBack }) {
      const [stateOpen, setStateOpen] = useState(false);
      const [dateOpen, setDateOpen] = useState(false);
      const [q, setQ] = useState('');
      const [searchFocus, setSearchFocus] = useState(false);

      const t = q.trim().toLowerCase();
      const filtered = US_STATES.filter(([n, a]) => !t || n.toLowerCase().includes(t) || a.toLowerCase() === t || a.toLowerCase().startsWith(t));
      const closeState = () => { setStateOpen(false); setSearchFocus(false); setQ(''); };

      const headline = profile.first.trim() ? 'Where you at, ' + profile.first.trim() + '?' : 'Where you at?';
      const canContinue = !!(profile.state && profile.dob);

      const overlays = (
        <React.Fragment>
          {/* searchable state sheet */}
          <div className={'sheet-scrim' + (stateOpen ? ' show' : '')} onClick={closeState} />
          <div className={'sheet tall' + (stateOpen ? ' show' : '')} role="dialog" aria-label="Choose state">
            <div className="grab" />
            <div className="sheet-search-wrap">
              <input className="sheet-search" placeholder="Search states" value={q}
                autoCapitalize="words" autoCorrect="off"
                onChange={(e) => setQ(e.target.value)}
                onFocus={() => setSearchFocus(true)} onBlur={() => setSearchFocus(false)} />
            </div>
            <div className="state-list">
              {filtered.length ? filtered.map(([n, a]) => (
                <button key={a} type="button" className={'state-row' + (profile.state === n ? ' sel' : '')}
                  onMouseDown={(e) => e.preventDefault()}
                  onClick={() => { patch({ state: n }); closeState(); }}>
                  <span>{n}</span>{profile.state === n && <TickIcon />}
                </button>
              )) : <div className="state-empty">No states match “{q}”.</div>}
            </div>
            {searchFocus && (
              <div onMouseDown={(e) => e.preventDefault()}><IOSKeyboard dark /></div>
            )}
          </div>
          {/* birthday wheel sheet */}
          <DateSheet open={dateOpen} onClose={() => setDateOpen(false)}
            onSet={(label) => { patch({ dob: label }); setDateOpen(false); }} />
        </React.Fragment>
      );

      return (
        <FormChrome headline={headline} sub="Tunes your score to your actual life — not some average."
          canContinue={canContinue} onContinue={onContinue} onBack={onBack} keyboardOpen={false}
          overlays={overlays}>
          <button className={'ofield tappable active' + (stateOpen ? ' focused' : '')} type="button" onClick={() => setStateOpen(true)}>
            <label className="oflabel">State</label>
            <span className={'ofield-val' + (profile.state ? '' : ' ph')}>{profile.state || 'Choose your state'}</span>
            <span className="ofield-chev"><ChevDown /></span>
          </button>
          <button className={'ofield tappable active' + (dateOpen ? ' focused' : '')} type="button" onClick={() => setDateOpen(true)}>
            <label className="oflabel">Birthday</label>
            <span className={'ofield-val' + (profile.dob ? '' : ' ph')}>{profile.dob || 'Select your birthday'}</span>
            <span className="ofield-chev"><ChevDown /></span>
          </button>
        </FormChrome>
      );
    }

    /* ---- SCREEN · Setup: Housing & Employment (Act 2 · 3/6) ---- */
    const HOUSING = ['Renting', 'Owning', 'With Family', 'Dorm', 'Other'];
    const EMPLOYMENT = ['Full Time', 'Part Time', 'Self Employed', 'Student', 'Between Jobs'];

    function ChipGroup({ label, options, value, onPick }) {
      return (
        <div className="chip-block">
          <div className="chip-label">{label}</div>
          <div className="chip-group">
            {options.map((o) => (
              <button key={o} type="button" className={'chip' + (value === o ? ' sel' : '')} onClick={() => onPick(o)}>{o}</button>
            ))}
          </div>
        </div>
      );
    }

    function SetupScreen({ profile, patch, onContinue, onBack }) {
      const canContinue = !!(profile.housing && profile.employment);
      return (
        <FormChrome headline="Your setup" sub="Rent, mortgage, or mom’s basement — it all counts."
          canContinue={canContinue} onContinue={onContinue} onBack={onBack} keyboardOpen={false}>
          <ChipGroup label="Housing" options={HOUSING} value={profile.housing} onPick={(v) => patch({ housing: v })} />
          <ChipGroup label="Employment" options={EMPLOYMENT} value={profile.employment} onPick={(v) => patch({ employment: v })} />
        </FormChrome>
      );
    }

    /* ---- SCREEN · Loading / Calculating (Act 3) ---- */
    function LoadingScreen({ onDone }) {
      const COPY = [
        'Doing the math you’ve been avoiding…',
        'Tallying the damage…',
        'Consulting the financial gods…',
        'Crunching your real score…',
      ];
      const [display, setDisplay] = useState(38); // one shared “forming score” value
      const [ci, setCi] = useState(0);
      const targetRef = React.useRef(74);
      React.useEffect(() => {
        // the meter HUNTS: pick a new target, ease the shared value toward it
        const retarget = setInterval(() => { targetRef.current = Math.floor(Math.random() * 100); }, 760);
        const tick = setInterval(() => { setDisplay((d) => d + (targetRef.current - d) * 0.16); }, 40);
        const copyInt = setInterval(() => setCi((i) => (i + 1) % COPY.length), 1700);
        const done = setTimeout(onDone, 1800 + Math.random() * 2600); // min dwell + variable “server” wait
        return () => { clearInterval(retarget); clearInterval(tick); clearInterval(copyInt); clearTimeout(done); };
      }, []);
      const C = 515; // full-circle score ring, top origin, clockwise (matches the reveal ring)
      const frac = Math.max(0, Math.min(1, display / 100));
      const dash = (frac * C).toFixed(1);
      const cometDeg = (frac * 360).toFixed(1);
      return (
        <div className="screen loading">
          <div className="reveal-eyebrow">Your starting score</div>
          <div className="load-gauge">
            <svg width="256" height="256" viewBox="0 0 200 200">
              <defs>
                <filter id="lglow" x="-40%" y="-40%" width="180%" height="180%">
                  <feGaussianBlur stdDeviation="3.4" result="b" />
                  <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
                </filter>
              </defs>
              <circle cx="100" cy="100" r="82" fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="9" />
              <circle className="load-sweep" cx="100" cy="100" r="82" fill="none" stroke="#FF007A" strokeWidth="9"
                strokeLinecap="round" strokeDasharray={dash + ' ' + C} filter="url(#lglow)" />
              <circle className="load-comet" cx="100" cy="18" r="5.5" fill="#fff" style={{ transform: 'rotate(' + cometDeg + 'deg)' }} />
            </svg>
            <div className="load-center">
              <span className="load-num">{String(Math.round(frac * 100)).padStart(2, '0')}</span>
              <span className="load-den">/100</span>
            </div>
          </div>
          <div className="load-copy">{COPY[ci]}</div>
        </div>
      );
    }

    /* ---- SCREEN · Reveal: Score + Snapshot (Act 3 finale) ---- */
    function bandFor(score) {
      if (score <= 40) return { label: 'Cooked', color: '#FF4D6D', react: 'Oof. We\u2019ve got work to do.', glow: 0.42 };
      if (score <= 60) return { label: 'Surviving', color: '#FFB020', react: 'Middle of the pack. Let\u2019s climb.', glow: 0.32 };
      if (score <= 80) return { label: 'Stable', color: '#00C2A8', react: 'Not bad \u2014 let\u2019s make it better.', glow: 0.26 };
      return { label: 'Thriving', color: '#00E676', react: 'Okay, show-off.', glow: 0.22 };
    }

    function RevealScreen({ profile }) {
      const SCORE = 55; // representative starting estimate (Surviving)
      const [val, setVal] = useState(0);
      const [locked, setLocked] = useState(false);
      React.useEffect(() => {
        let cur = 0;
        const iv = setInterval(() => {
          cur = cur + (SCORE - cur) * 0.12; // decelerating ease — lands on the score
          if (Math.abs(SCORE - cur) < 0.3) { setVal(SCORE); setLocked(true); clearInterval(iv); } // locked in → dot dissolves
          else setVal(cur);
        }, 32);
        return () => clearInterval(iv);
      }, []);

      const C = 515; // full-circle score ring, top origin, clockwise
      const frac = Math.max(0, Math.min(1, val / 100));
      const dash = (frac * C).toFixed(1);
      const cometDeg = (frac * 360).toFixed(1);
      const band = bandFor(SCORE);
      const snap = [
        { label: 'Income', val: profile.income || '\u2014' },
        { label: 'Debt', val: profile.debt || '\u2014' },
        { label: 'Savings', val: profile.savings || '\u2014' },
      ];

      return (
        <div className="screen reveal">
          <div className="reveal-eyebrow">Your starting score</div>
          <div className="reveal-gauge">
            <div className="reveal-glow" style={{ background: 'radial-gradient(closest-side, ' + band.color + ', transparent 72%)', opacity: band.glow }} />
            <svg width="256" height="256" viewBox="0 0 200 200">
              <defs>
                <filter id="rglow" x="-40%" y="-40%" width="180%" height="180%">
                  <feGaussianBlur stdDeviation="3.2" result="b" />
                  <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
                </filter>
              </defs>
              <circle cx="100" cy="100" r="82" fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="9" />
              <circle cx="100" cy="100" r="82" fill="none" stroke={band.color} strokeWidth="9" strokeLinecap="round"
                strokeDasharray={dash + ' ' + C} filter="url(#rglow)"
                style={{ transformBox: 'view-box', transformOrigin: '100px 100px', transform: 'rotate(-90deg)' }} />
              <circle className="reveal-comet" cx="100" cy="18" r="5.5" fill="#fff"
                style={{ transformBox: 'view-box', transformOrigin: '100px 100px', transform: 'rotate(' + cometDeg + 'deg)', opacity: locked ? 0 : 1 }} />
            </svg>
            <div className="reveal-center">
              <span className="reveal-score">{Math.round(val)}</span>
              <span className="reveal-den">/ 100</span>
            </div>
          </div>
          <div className="reveal-band" style={{ color: band.color }}>{band.label}</div>
          <div className="reveal-react">{band.react}</div>

          <div className="snapshot">
            {snap.map((s) => (
              <div className="snap-cell" key={s.label}>
                <div className="snap-label">{s.label}</div>
                <div className="snap-val">{s.val}</div>
              </div>
            ))}
          </div>

          <div className="reveal-note">Your starting estimate — built from the basics. Your first real roast sharpens it.</div>

          <a className="reveal-cta" href="Am I Broke - HomeTabs.html">See the real roast →</a>
        </div>
      );
    }

    function StubScreen({ meta, idx, total, back, next }) {
      const kicker = meta.act === 1
        ? 'ACT 1 \u00b7 SCENE ' + (meta.scene + 1) + ' OF 3'
        : meta.act === 2
          ? 'ACT 2 \u00b7 STEP ' + meta.step + ' OF 7'
          : 'FINISH';
      return (
        <div className="screen stub">
          <div className="stub-center">
            <div className="stub-kicker">{kicker}</div>
            <div className="stub-title">{meta.title}</div>
            <div className="stub-note">coming next</div>
          </div>
          <div className="stub-nav">
            <button className="back-btn" type="button" disabled={idx === 0} onClick={back}>
              <LeftArrow /> Back
            </button>
            <button className="next-fab" type="button" disabled={idx === total - 1} onClick={next} aria-label="Next">
              <ArrowIcon />
            </button>
          </div>
        </div>
      );
    }

    function DevJump({ idx, screens, go }) {
      return (
        <div className="devjump" data-dev>
          <select value={idx} onChange={(e) => go(Number(e.target.value))} aria-label="Jump to screen">
            {screens.map((s, i) => (
              <option key={s.id} value={i}>{(i + 1) + '. ' + s.id}</option>
            ))}
          </select>
        </div>
      );
    }

    function Shell() {
      const total = SCREENS.length;
      const [idx, setIdx] = useState(() => {
        const v = parseInt(localStorage.getItem('amibroke_ob_idx'), 10);
        return Number.isInteger(v) && v >= 0 && v < total ? v : 7; // default: Debt (the finished screen)
      });
      const go = (n) => {
        const c = Math.max(0, Math.min(total - 1, n));
        setIdx(c);
        try { localStorage.setItem('amibroke_ob_idx', String(c)); } catch (e) {}
      };
      const next = () => go(idx + 1);
      const back = () => go(idx - 1);
      const meta = SCREENS[idx];
      const [profile, setProfile] = useState({ first: '', last: '', user: '', state: '', dob: '', housing: '', employment: '' });
      const patch = (p) => setProfile((prev) => ({ ...prev, ...p }));

      const body = meta.act === 1
        ? <StoryScene scene={meta.scene}
            onAdvance={() => go(meta.scene === 2 ? 0 : idx + 1)}
            onBack={() => go(meta.scene === 0 ? 2 : idx - 1)}
            onGetStarted={() => go(3)} />
        : meta.id === 'name'
          ? <NameScreen profile={profile} patch={patch} onContinue={next} onBack={back} />
          : meta.id === 'location'
            ? <LocationScreen profile={profile} patch={patch} onContinue={next} onBack={back} />
            : meta.id === 'setup'
              ? <SetupScreen profile={profile} patch={patch} onContinue={next} onBack={back} />
              : meta.id === 'income'
                ? <MoneyScreen headline="The money in" sub="Your monthly income — ballpark’s fine, exact if you’re feeling brave." ranges={INCOME_RANGES} sheetTitle="Roughly how much comes in each month?" field="income" patch={patch} onNext={next} onBack={back} />
                : meta.id === 'expenses'
                ? <MoneyScreen headline="The money out" sub="What you spend in a month — rent, food, the works. Ballpark’s fine, exact if you’re feeling brave." ranges={EXPENSES_RANGES} sheetTitle="Roughly how much goes out each month?" field="expenses" patch={patch} onNext={next} onBack={back} />
                : meta.id === 'debt'
                  ? <MoneyScreen headline="What's the damage?" sub="Combine all your credit cards, loans, and bad decisions into one number." ranges={DEBT_RANGES} sheetTitle="Roughly how much do you owe?" field="debt" patch={patch} onNext={next} onBack={back} />
                  : meta.id === 'savings'
                    ? <MoneyScreen headline="The cushion" sub="Liquid savings — cash you could reach tomorrow. Not retirement or investments." ranges={SAVINGS_RANGES} sheetTitle="Roughly how much have you got saved?" field="savings" patch={patch} onNext={next} onBack={back} />
                    : meta.id === 'loading'
                      ? <LoadingScreen onDone={next} />
                      : meta.id === 'reveal'
                        ? <RevealScreen profile={profile} />
                        : <StubScreen meta={meta} idx={idx} total={total} back={back} next={next} />;

      return (
        <div className="flow-root">
          <GlobalProgress meta={meta} />
          {body}
          <DevJump idx={idx} screens={SCREENS} go={go} />
        </div>
      );
    }

    function App() {
      return (
        <IOSDevice dark>
          <Shell />
        </IOSDevice>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    function fit() {
      const W = 402, H = 874, pad = 36;
      const s = Math.min((window.innerWidth - pad) / W, (window.innerHeight - pad) / H, 1);
      document.getElementById('scaler').style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fit);
    fit();
  </script>
</body>
</html>
