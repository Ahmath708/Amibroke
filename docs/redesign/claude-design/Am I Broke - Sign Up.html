<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Am I Broke? — Sign Up</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0B0B0F;
    --card: #16161F;
    --oauth: #1C1C24;
    --neon: #FF007A;
    --line: rgba(255,255,255,0.08);
    --text: #FFFFFF;
    --muted: rgba(255,255,255,0.50);
    --faint: rgba(255,255,255,0.30);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background:
      radial-gradient(900px 600px at 50% -10%, #15151d 0%, #0a0a0d 55%, #07070a 100%);
    font-family: 'Geist', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  #scaler { transform-origin: center center; }

  /* ---------- screen ---------- */
  .screen {
    height: 100%; width: 100%;
    background: var(--bg);
    display: flex; flex-direction: column;
    padding: 72px 24px 30px;
    color: var(--text);
    position: relative;
  }
  .screen::after {
    /* faint neon bloom anchored behind the CTA */
    content: ''; position: absolute; left: 50%; bottom: 96px;
    width: 320px; height: 200px; transform: translateX(-50%);
    background: radial-gradient(closest-side, rgba(255,0,122,0.16), transparent 75%);
    filter: blur(8px); pointer-events: none; opacity: .9;
  }

  .brand {
    display: flex; align-items: center; gap: 7px;
    font-size: 15px; font-weight: 700; letter-spacing: -0.3px;
    color: #fff;
  }
  .brand .dot {
    width: 22px; height: 22px; border-radius: 7px;
    background: var(--neon); display: grid; place-items: center;
    font-size: 14px; font-weight: 800; color: #fff;
    box-shadow: 0 0 16px rgba(255,0,122,0.5);
  }
  .brand-logo { width: 30px; height: 30px; object-fit: contain; display: block; flex-shrink: 0; }

  .hero { margin-top: 26px; }
  .hero h1 {
    margin: 0; font-size: 38px; font-weight: 800;
    letter-spacing: -1.6px; line-height: 1.0; color: #fff;
  }
  .hero h1 .accent { color: #fff; }
  .hero p {
    margin: 14px 0 0; font-size: 15px; line-height: 1.5;
    color: var(--muted); font-weight: 450; max-width: 290px;
    text-wrap: pretty;
  }

  /* ---------- oauth ---------- */
  .oauth { margin-top: 26px; display: flex; flex-direction: column; gap: 11px; }
  .oauth-btn {
    width: 100%; height: 54px; border-radius: 9999px;
    background: var(--oauth); border: 1px solid rgba(255,255,255,0.07);
    color: #fff; font-family: inherit; font-size: 15.5px; font-weight: 600;
    letter-spacing: -0.2px;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    cursor: pointer; transition: background .2s, transform .12s, border-color .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .oauth-btn:hover { background: #22222c; }
  .oauth-btn:active { transform: scale(.985); }
  .oauth-btn svg { display: block; }

  /* ---------- divider ---------- */
  .divider {
    display: flex; align-items: center; gap: 14px;
    margin: 20px 0 18px; color: var(--faint);
    font-size: 12px; font-weight: 500; letter-spacing: 0.4px;
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, transparent, var(--line), transparent);
  }

  /* ---------- fields ---------- */
  .fields { display: flex; flex-direction: column; }
  .field {
    position: relative; height: 60px;
    background: var(--card); border: 1px solid var(--line);
    border-radius: 16px;
    transition: border-color .25s, box-shadow .25s, background .25s;
  }
  .field.focused {
    border-color: var(--neon);
    box-shadow: 0 0 0 3px rgba(255,0,122,0.16), 0 0 22px rgba(255,0,122,0.30);
    background: #181822;
  }
  .field input {
    position: absolute; left: 17px; right: 17px; top: 28px; bottom: 9px;
    background: transparent; border: none; outline: none;
    color: #fff; font-family: inherit; font-size: 16px; font-weight: 500;
    letter-spacing: -0.2px; width: calc(100% - 34px); padding: 0;
  }
  .field.has-eye input { right: 50px; width: calc(100% - 68px); }
  .field input::placeholder { color: rgba(255,255,255,0.22); }
  .flabel {
    position: absolute; left: 17px; top: 50%;
    transform: translateY(-50%) scale(1); transform-origin: left center;
    font-size: 16px; font-weight: 500; color: var(--muted);
    pointer-events: none; letter-spacing: -0.2px;
    transition: top .2s cubic-bezier(.4,0,.2,1),
                transform .2s cubic-bezier(.4,0,.2,1),
                color .2s ease;
  }
  .field.active .flabel {
    top: 9px; transform: translateY(0) scale(0.75);
    color: var(--faint); font-weight: 600;
  }
  .field.active.focused .flabel { color: var(--neon); }

  .eye {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 40px; height: 40px; border: none; background: transparent;
    display: grid; place-items: center; cursor: pointer;
    color: rgba(255,255,255,0.34); transition: color .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .eye:hover { color: rgba(255,255,255,0.7); }

  /* deferred password wrapper */
  .pw-wrap {
    max-height: 0; opacity: 0; overflow: hidden;
    transform: translateY(-6px); margin-top: 0;
    transition: max-height .42s cubic-bezier(.4,0,.2,1),
                opacity .34s ease, transform .42s cubic-bezier(.4,0,.2,1),
                margin-top .42s cubic-bezier(.4,0,.2,1);
  }
  .pw-wrap.show { max-height: 84px; opacity: 1; transform: translateY(0); margin-top: 12px; }

  .forgot {
    align-self: flex-end; margin-top: 12px;
    font-size: 12.5px; font-weight: 500; color: var(--muted);
    background: none; border: none; cursor: pointer; padding: 2px 0;
    transition: color .2s; font-family: inherit;
  }
  .forgot:hover { color: #fff; }

  /* ---------- footer / cta ---------- */
  .grow { flex: 1 1 auto; min-height: 18px; }
  .cta {
    position: relative; width: 100%; height: 58px; border-radius: 18px;
    background: var(--neon); color: #fff; border: none;
    font-family: inherit; font-size: 16.5px; font-weight: 700; letter-spacing: -0.3px;
    cursor: pointer; overflow: hidden;
    box-shadow: 0 10px 34px rgba(255,0,122,0.40);
    transition: transform .14s ease, box-shadow .3s ease, opacity .3s ease, filter .2s;
    -webkit-tap-highlight-color: transparent;
  }
  .cta:hover { filter: brightness(1.06); }
  .cta:active { transform: scale(.975); }
  .cta:disabled {
    opacity: .42; box-shadow: none; cursor: not-allowed;
    transform: none; filter: none;
  }
  .cta .label { display: inline-flex; align-items: center; gap: 9px; }
  .spinner {
    width: 19px; height: 19px; border-radius: 50%;
    border: 2.4px solid rgba(255,255,255,0.35); border-top-color: #fff;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ---------- legal ---------- */
  .legal {
    display: flex; align-items: flex-start; gap: 11px;
    margin-top: 18px; cursor: pointer; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  .cb {
    width: 21px; height: 21px; border-radius: 7px; flex-shrink: 0;
    border: 1.5px solid rgba(255,255,255,0.26); background: transparent;
    display: grid; place-items: center; margin-top: 1px;
    transition: background .18s ease, border-color .18s ease, transform .12s ease;
  }
  .cb.on { background: var(--neon); border-color: var(--neon); }
  .cb svg { opacity: 0; transform: scale(.5); transition: opacity .18s, transform .18s; }
  .cb.on svg { opacity: 1; transform: scale(1); }
  .legal-text {
    font-size: 12.5px; line-height: 1.5; color: var(--faint);
    font-weight: 450; padding-top: 1px;
  }
  .legal-text a { color: rgba(255,255,255,0.72); text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.25); }

  /* ---------- top bar (back + brand) ---------- */
  .topbar { display: flex; align-items: center; gap: 12px; }

  /* ---------- sign up / log in toggle ---------- */
  .auth-toggle {
    width: 100%; text-align: center; margin-top: 16px;
    font-size: 13.5px; font-weight: 500; color: var(--muted);
    background: none; border: none; cursor: pointer; font-family: inherit;
    transition: color .2s; -webkit-tap-highlight-color: transparent;
  }
  .auth-toggle b { color: #fff; font-weight: 700; }
  .auth-toggle:hover { color: rgba(255,255,255,0.72); }

  @media (prefers-reduced-motion: reduce) {
    * { transition-duration: .01ms !important; animation-duration: .01ms !important; }
  }
</style>
</head>
<body>
  <div id="stage"><div id="scaler"><div id="root"></div></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>

  <script type="text/babel">
    const { useState, useRef, useEffect } = React;

    /* ---- brand icons ---- */
    function AppleIcon() {
      return (
        <svg width="17" height="20" viewBox="0 0 814 1000" fill="#fff" aria-hidden="true">
          <path d="M788.1 340.9c-5.8 4.5-108.2 62.2-108.2 190.5 0 148.4 130.3 200.9 134.2 202.2-.6 3.2-20.7 71.9-68.7 141.9-42.8 61.6-87.5 123.1-155.5 123.1s-85.5-39.5-164-39.5c-76.5 0-103.7 40.8-165.9 40.8s-105.6-57-155.5-127C46.7 790.7 0 663 0 541.8c0-194.4 126.4-297.5 250.8-297.5 66.1 0 121.2 43.4 162.7 43.4 39.5 0 101.1-46 176.3-46 28.5 0 130.9 2.6 198.3 99.2zm-234-181.5c31.1-36.9 53.1-88.1 53.1-139.3 0-7.1-.6-14.3-1.9-20.1-50.6 1.9-110.8 33.7-147.1 75.8-28.5 32.4-55.1 83.6-55.1 135.5 0 7.8 1.3 15.6 1.9 18.1 3.2.6 8.4 1.3 13.6 1.3 45.4 0 102.5-30.4 135.5-71.2z"/>
        </svg>
      );
    }
    function GoogleIcon() {
      return (
        <svg width="17" height="17" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>
          <path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>
          <path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>
          <path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>
        </svg>
      );
    }
    function EyeIcon({ off }) {
      return (
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round">
          <path d="M2.2 12S5.8 5.2 12 5.2 21.8 12 21.8 12 18.2 18.8 12 18.8 2.2 12 2.2 12z"/>
          <circle cx="12" cy="12" r="3.1"/>
          {off && <line x1="3.5" y1="3.5" x2="20.5" y2="20.5" stroke="currentColor" strokeWidth="1.7"/>}
        </svg>
      );
    }
    function CheckIcon() {
      return (
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none"
             stroke="#fff" strokeWidth="3.4" strokeLinecap="round" strokeLinejoin="round">
          <path d="M4 12.5l5 5L20 6.5"/>
        </svg>
      );
    }
    const EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

    function AuthScreen() {
      const [email, setEmail] = useState('');
      const [emailFocus, setEmailFocus] = useState(false);
      const [pw, setPw] = useState('');
      const [pwFocus, setPwFocus] = useState(false);
      const [showPw, setShowPw] = useState(false);      // password field revealed
      const [pwVisible, setPwVisible] = useState(false); // secureTextEntry toggle
      const [agreed, setAgreed] = useState(false);
      const [status, setStatus] = useState('idle');      // idle | loading | done
      const [mode, setMode] = useState('signup');         // signup | signin
      const pwRef = useRef(null);

      const emailValid = EMAIL_RE.test(email.trim());

      // Reveal the password field once a valid email pattern is recognized.
      useEffect(() => {
        if (emailValid && !showPw) setShowPw(true);
      }, [emailValid]);

      // Also reveal when the user "moves forward" off the email field with intent.
      const handleEmailBlur = () => {
        setEmailFocus(false);
        if (!showPw && email.includes('@')) setShowPw(true);
      };

      const revealAndFocusPw = () => {
        if (!showPw) setShowPw(true);
        setTimeout(() => pwRef.current && pwRef.current.focus(), 260);
      };

      const canSubmit = emailValid && pw.length >= 4 && (mode === 'signin' || agreed) && status === 'idle';

      const submit = () => {
        if (!canSubmit) return;
        setStatus('loading');
        setTimeout(() => setStatus('done'), 1500);
      };
      const toggleMode = () => { setMode((m) => (m === 'signup' ? 'signin' : 'signup')); setStatus('idle'); };
      const verb = mode === 'signup' ? 'Sign up' : 'Sign in';

      return (
        <div className="screen">
          {/* top bar — back + brand */}
          <div className="topbar">
            <BackChevron href="Am I Broke - Landing.html" label="Back to start" />
            <div className="brand">
              <img className="brand-logo" src="amibroke-logo.png" alt="Am I Broke logo" />
              <span>amibroke<span style={{ color: 'var(--neon)' }}>?</span></span>
            </div>
          </div>

          {/* hero copy */}
          <div className="hero">
            {mode === 'signup'
              ? <h1>Your roast starts here.</h1>
              : <h1>Welcome back.</h1>}
            <p>{mode === 'signup'
              ? 'Make an account to get your 0–100 score and your roast.'
              : 'Log in to pick up right where you left off.'}</p>
          </div>

          {/* oauth stack */}
          <div className="oauth">
            <button className="oauth-btn" type="button">
              <AppleIcon /><span>{verb} with Apple</span>
            </button>
            <button className="oauth-btn" type="button">
              <GoogleIcon /><span>{verb} with Google</span>
            </button>
          </div>

          <div className="divider">or</div>

          {/* fields */}
          <div className="fields">
            <div className={'field' + (emailFocus ? ' focused' : '') + ((emailFocus || email) ? ' active' : '')}>
              <label className="flabel">Email Address</label>
              <input
                type="email" inputMode="email" autoComplete="email"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
                onFocus={() => setEmailFocus(true)}
                onBlur={handleEmailBlur}
                onKeyDown={(e) => { if (e.key === 'Enter') revealAndFocusPw(); }}
              />
            </div>

            <div className={'pw-wrap' + (showPw ? ' show' : '')}>
              <div className={'field has-eye' + (pwFocus ? ' focused' : '') + ((pwFocus || pw) ? ' active' : '')}>
                <label className="flabel">Password</label>
                <input
                  ref={pwRef}
                  type={pwVisible ? 'text' : 'password'}
                  autoComplete={mode === 'signup' ? 'new-password' : 'current-password'}
                  value={pw}
                  onChange={(e) => setPw(e.target.value)}
                  onFocus={() => setPwFocus(true)}
                  onBlur={() => setPwFocus(false)}
                  onKeyDown={(e) => { if (e.key === 'Enter') submit(); }}
                />
                <button className="eye" type="button" aria-label="Toggle password visibility"
                        onMouseDown={(e) => e.preventDefault()}
                        onClick={() => setPwVisible((v) => !v)}>
                  <EyeIcon off={pwVisible} />
                </button>
              </div>
            </div>

            {mode === 'signin' && showPw && (
              <button className="forgot" type="button">Forgot password?</button>
            )}
          </div>

          <div className="grow" />

          {/* primary cta */}
          <button className="cta" type="button" disabled={!canSubmit} onClick={submit}>
            {status === 'idle' && <span className="label">{mode === 'signup' ? 'See how cooked you are' : 'Log in'}</span>}
            {status === 'loading' && <span className="label"><span className="spinner" />Crunching the numbers…</span>}
            {status === 'done' && <span className="label"><CheckIcon /> You're in — let's go</span>}
          </button>

          {/* legal — sign-up only */}
          {mode === 'signup' && (
            <div className="legal" onClick={() => setAgreed((a) => !a)}>
              <span className={'cb' + (agreed ? ' on' : '')}><CheckIcon /></span>
              <span className="legal-text">
                I agree to the <a href="#" onClick={(e) => e.preventDefault()}>Terms of Service</a> and{' '}
                <a href="#" onClick={(e) => e.preventDefault()}>Privacy Policy</a>.
              </span>
            </div>
          )}

          {/* mode toggle */}
          <button className="auth-toggle" type="button" onClick={toggleMode}>
            {mode === 'signup'
              ? <React.Fragment>Already have an account? <b>Log in</b></React.Fragment>
              : <React.Fragment>New here? <b>Sign up</b></React.Fragment>}
          </button>
        </div>
      );
    }

    function App() {
      return (
        <IOSDevice dark>
          <AuthScreen />
        </IOSDevice>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    /* fit-to-viewport scaling */
    function fit() {
      const W = 402, H = 874, pad = 36;
      const s = Math.min((window.innerWidth - pad) / W, (window.innerHeight - pad) / H, 1);
      document.getElementById('scaler').style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fit);
    fit();
  </script>
</body>
</html>
