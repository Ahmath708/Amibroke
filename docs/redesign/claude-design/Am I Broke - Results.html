<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Am I Broke? — Your Roast</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0B0B0F;
    --card: #16161F;
    --card-2: #1C1C24;
    --neon: #FF007A;
    --line: rgba(255,255,255,0.08);
    --text: #FFFFFF;
    --muted: rgba(255,255,255,0.50);
    --faint: rgba(255,255,255,0.30);
    /* score bands */
    --cooked: #FF4D6D;
    --surviving: #FFB020;
    --stable: #00C2A8;
    --thriving: #00E676;
    --good: #3DDC97;
    --bad: #FF5470;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: radial-gradient(900px 600px at 50% -10%, #15151d 0%, #0a0a0d 55%, #07070a 100%);
    font-family: 'Geist', system-ui, sans-serif; -webkit-font-smoothing: antialiased;
  }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #scaler { transform-origin: center center; }

  .screen {
    height: 100%; width: 100%; background: var(--bg); color: var(--text);
    display: flex; flex-direction: column; position: relative; overflow: hidden;
  }
  .scroll { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 12px 22px 40px; scrollbar-width: none; -ms-overflow-style: none; }
  .scroll::-webkit-scrollbar { width: 0; height: 0; display: none; }

  /* ---- top bar ---- */
  .res-top { display: flex; align-items: center; justify-content: space-between; padding: 44px 0 12px; }
  .res-mask { position: absolute; top: 0; left: 0; right: 0; height: 48px; background: var(--bg); z-index: 5; pointer-events: none; }
  .lock-toggle { display: inline-flex; align-items: center; gap: 6px; padding: 7px 12px; border-radius: 9999px; background: var(--card); border: 1px solid var(--line); color: var(--muted); font-family: inherit; font-size: 11px; font-weight: 700; letter-spacing: 0.4px; text-transform: uppercase; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: color .2s, border-color .2s; }
  .lock-toggle.on { color: var(--neon); border-color: rgba(255,0,122,0.4); }
  .lock-toggle:active { transform: scale(.96); }

  /* ---- score hero ---- */
  .score-hero { display: flex; align-items: center; gap: 18px; margin-top: 4px; }
  .ring-wrap { position: relative; width: 150px; height: 150px; flex-shrink: 0; display: grid; place-items: center; }
  .ring-glow { position: absolute; width: 140px; height: 140px; border-radius: 50%; filter: blur(12px); pointer-events: none; }
  .ring-center { position: absolute; display: flex; flex-direction: column; align-items: center; line-height: 1; }
  .ring-score { font-size: 50px; font-weight: 800; letter-spacing: -2.5px; font-variant-numeric: tabular-nums; }
  .ring-den { margin-top: 5px; font-family: 'Geist Mono', monospace; font-size: 12px; font-weight: 600; color: var(--faint); }
  .ring-settle { animation: settle .4s cubic-bezier(.34,1.5,.5,1); }
  @keyframes settle { 0% { transform: scale(1); } 40% { transform: scale(1.05); } 100% { transform: scale(1); } }
  .hero-meta { display: flex; flex-direction: column; align-items: flex-start; gap: 11px; min-width: 0; }
  .band-pill { display: inline-flex; align-items: center; gap: 8px; padding: 9px 16px; border-radius: 9999px; font-size: 19px; font-weight: 800; letter-spacing: -0.4px; }
  .band-pill .bdot { width: 9px; height: 9px; border-radius: 50%; }
  .conf-badge { display: inline-flex; align-items: center; gap: 7px; padding: 7px 12px; border-radius: 9999px; background: var(--card); border: 1px solid var(--line); font-size: 12px; font-weight: 600; color: var(--muted); }
  .conf-badge .bars { display: inline-flex; align-items: flex-end; gap: 2px; height: 12px; }
  .conf-badge .bars i { width: 3px; border-radius: 1px; background: var(--good); }
  .conf-badge b { color: #fff; font-weight: 700; }

  /* ---- roast card ---- */
  .roast-card { margin-top: 24px; position: relative; overflow: hidden; border-radius: 22px; border: 1px solid rgba(255,0,122,0.22); background: linear-gradient(160deg, rgba(255,0,122,0.13), rgba(255,0,122,0.03) 60%), var(--card); padding: 20px 20px 22px; box-shadow: 0 18px 50px -28px rgba(255,0,122,0.6); }
  .roast-card .qmark { position: absolute; top: 6px; right: 18px; font-size: 60px; line-height: 1; font-family: 'Geist', sans-serif; font-weight: 800; color: rgba(255,0,122,0.16); }
  .roast-label { font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: var(--neon); }
  .roast-text { margin: 12px 0 0; font-size: 26px; font-weight: 800; letter-spacing: -1px; line-height: 1.12; color: #fff; text-wrap: pretty; max-width: 94%; }
  .roast-text .hl { color: #ff5fa6; }

  /* ---- #1 fix ---- */
  .fix-card { margin-top: 14px; border-radius: 18px; border: 1px solid rgba(61,220,151,0.3); background: linear-gradient(180deg, rgba(61,220,151,0.08), transparent), var(--card); padding: 16px 17px; display: flex; gap: 13px; align-items: flex-start; }
  .fix-ico { width: 38px; height: 38px; flex-shrink: 0; border-radius: 11px; background: rgba(61,220,151,0.14); border: 1px solid rgba(61,220,151,0.3); display: grid; place-items: center; color: var(--good); }
  .fix-body { flex: 1; min-width: 0; }
  .fix-label { font-size: 10.5px; font-weight: 800; letter-spacing: 1.4px; text-transform: uppercase; color: var(--good); }
  .fix-action { font-size: 16px; font-weight: 700; color: #fff; letter-spacing: -0.3px; margin-top: 4px; line-height: 1.25; }
  .fix-impact { margin-top: 9px; font-size: 13px; font-weight: 700; color: var(--good); font-family: 'Geist Mono', monospace; }

  /* ---- primary cta + quick actions ---- */
  .cta-primary { margin-top: 18px; width: 100%; height: 58px; border-radius: 18px; border: none; background: var(--neon); color: #fff; font-family: inherit; font-size: 17px; font-weight: 700; letter-spacing: -0.3px; cursor: pointer; box-shadow: 0 12px 34px rgba(255,0,122,0.45); transition: transform .14s ease, filter .2s; -webkit-tap-highlight-color: transparent; display: flex; align-items: center; justify-content: center; gap: 9px; }
  .cta-primary:hover { filter: brightness(1.06); }
  .cta-primary:active { transform: scale(.98); }
  .cta-primary.locked { background: var(--card-2); border: 1px solid rgba(255,0,122,0.4); box-shadow: none; color: #fff; }
  .cta-primary.locked .price { color: var(--neon); font-family: 'Geist Mono', monospace; }
  .quick-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 9px; margin-top: 11px; }
  .quick-btn { display: flex; flex-direction: column; align-items: center; gap: 7px; padding: 13px 4px; border-radius: 14px; background: var(--card); border: 1px solid var(--line); color: var(--muted); font-family: inherit; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: border-color .2s, color .2s, transform .12s; }
  .quick-btn:hover { border-color: rgba(255,255,255,0.18); color: #fff; }
  .quick-btn:active { transform: scale(.96); }
  .quick-btn .ql { font-size: 11.5px; font-weight: 600; letter-spacing: -0.1px; }

  /* ---- breakdown toggle ---- */
  .bd-toggle { margin-top: 22px; width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 16px 18px; border-radius: 16px; background: var(--card); border: 1px solid var(--line); color: #fff; font-family: inherit; font-size: 15px; font-weight: 700; letter-spacing: -0.2px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: border-color .2s, background .2s; }
  .bd-toggle:hover { border-color: rgba(255,255,255,0.18); }
  .bd-toggle .chev { transition: transform .3s cubic-bezier(.22,1,.36,1); color: var(--faint); display: flex; }
  .bd-toggle.open .chev { transform: rotate(90deg); }
  .bd-sub { display: block; font-size: 12px; font-weight: 500; color: var(--muted); margin-top: 3px; }

  .breakdown { overflow: hidden; }

  /* ---- sections ---- */
  .section-label { font-size: 12px; font-weight: 700; letter-spacing: 0.6px; text-transform: uppercase; color: var(--faint); margin: 26px 2px 12px; display: flex; align-items: center; gap: 8px; }
  .glass-card { background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 17px 18px; }
  .para { font-size: 14.5px; line-height: 1.55; color: rgba(255,255,255,0.78); font-weight: 450; text-wrap: pretty; }
  .para b { color: #fff; font-weight: 700; }

  /* elevated list-group (reusable) */
  .list-group { background: var(--card); border: 1px solid var(--line); border-radius: 18px; overflow: hidden; }
  .lg-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 14px 17px; position: relative; }
  .lg-row + .lg-row::before { content: ''; position: absolute; top: 0; left: 17px; right: 17px; height: 1px; background: var(--line); }
  .lg-label { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.82); letter-spacing: -0.2px; }
  .lg-label.with-ico { display: inline-flex; align-items: center; gap: 11px; }
  .lg-ico { width: 32px; height: 32px; border-radius: 9px; background: rgba(255,255,255,0.05); border: 1px solid var(--line); display: grid; place-items: center; color: rgba(255,255,255,0.7); flex-shrink: 0; }
  .lg-val { font-size: 15px; font-weight: 800; font-family: 'Geist Mono', monospace; letter-spacing: -0.4px; color: #fff; flex-shrink: 0; }
  .lg-val.pos { color: var(--good); }
  .lg-sub { display: block; font-size: 11.5px; color: var(--faint); font-weight: 600; margin-top: 2px; }
  .lg-r { display: flex; flex-direction: column; align-items: flex-end; }

  /* emotional status */
  .emo { display: flex; align-items: center; gap: 14px; }
  .emo .emo-face { font-size: 38px; line-height: 1; }
  .emo .emo-label { font-size: 18px; font-weight: 800; letter-spacing: -0.4px; color: #fff; }
  .emo .emo-sub { font-size: 12.5px; color: var(--muted); margin-top: 2px; }

  /* check / x lists */
  .marklist { display: flex; flex-direction: column; gap: 1px; }
  .mark-row { display: flex; align-items: flex-start; gap: 12px; padding: 11px 0; }
  .mark-row + .mark-row { border-top: 1px solid var(--line); }
  .mark-ico { width: 22px; height: 22px; border-radius: 7px; flex-shrink: 0; display: grid; place-items: center; margin-top: -1px; }
  .mark-ico.good { background: rgba(61,220,151,0.13); color: var(--good); }
  .mark-ico.bad { background: rgba(255,84,112,0.13); color: var(--bad); }
  .mark-text { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.84); line-height: 1.4; letter-spacing: -0.2px; }

  /* debts */
  .debt-row { display: flex; align-items: center; gap: 13px; padding: 15px 17px; }
  .debt-ico { width: 40px; height: 40px; border-radius: 12px; background: rgba(255,84,112,0.12); border: 1px solid rgba(255,84,112,0.28); display: grid; place-items: center; color: var(--bad); flex-shrink: 0; }
  .debt-body { flex: 1; min-width: 0; }
  .debt-name { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.2px; }
  .debt-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .debt-bal { font-size: 16px; font-weight: 800; font-family: 'Geist Mono', monospace; letter-spacing: -0.4px; color: #fff; flex-shrink: 0; }
  .debt-cta { display: flex; align-items: center; justify-content: space-between; gap: 10px; padding: 14px 17px; border-top: 1px solid var(--line); background: rgba(255,0,122,0.05); cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background .2s; width: 100%; border-left: none; border-right: none; border-bottom: none; font-family: inherit; }
  .debt-cta:hover { background: rgba(255,0,122,0.1); }
  .debt-cta span { font-size: 14px; font-weight: 700; color: var(--neon); letter-spacing: -0.2px; display: inline-flex; align-items: center; gap: 7px; }
  .debt-cta.locked span { color: var(--muted); }
  .debt-cta .price { color: var(--neon); font-family: 'Geist Mono', monospace; font-weight: 700; }

  /* budget 50/30/20 */
  .bud-row { padding: 13px 0; }
  .bud-row + .bud-row { border-top: 1px solid var(--line); }
  .bud-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
  .bud-name { font-size: 14px; font-weight: 700; color: #fff; letter-spacing: -0.2px; }
  .bud-name span { color: var(--muted); font-weight: 500; font-size: 12px; }
  .bud-nums { font-family: 'Geist Mono', monospace; font-size: 12.5px; font-weight: 600; color: var(--muted); }
  .bud-nums b { color: #fff; }
  .bud-track { height: 7px; border-radius: 99px; background: rgba(255,255,255,0.07); position: relative; overflow: hidden; }
  .bud-target { position: absolute; top: -2px; bottom: -2px; width: 2px; background: rgba(255,255,255,0.5); border-radius: 2px; }
  .bud-fill { height: 100%; border-radius: 99px; }

  /* insights */
  .insight { display: flex; align-items: flex-start; gap: 11px; padding: 11px 0; }
  .insight + .insight { border-top: 1px solid var(--line); }
  .insight .iarr { color: var(--neon); flex-shrink: 0; margin-top: 1px; display: flex; }
  .insight .itext { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.84); line-height: 1.45; letter-spacing: -0.2px; }

  .disclaimer { margin-top: 26px; font-size: 11.5px; line-height: 1.5; color: var(--faint); font-weight: 450; text-align: center; text-wrap: pretty; }

  /* ---- share screen ---- */
  .share-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; color: #fff; }
  .seg-ctrl { display: flex; gap: 4px; padding: 4px; margin-top: 8px; background: var(--card); border: 1px solid var(--line); border-radius: 13px; }
  .seg-ctrl button { flex: 1; height: 40px; border: none; border-radius: 9px; background: transparent; color: var(--muted); font-family: inherit; font-size: 13.5px; font-weight: 700; letter-spacing: -0.2px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background .2s, color .2s, box-shadow .2s; }
  .seg-ctrl button.on { background: rgba(255,0,122,0.14); color: #ff5fa6; box-shadow: inset 0 0 0 1px rgba(255,0,122,0.32); }
  .share-stage { display: flex; justify-content: center; margin-top: 22px; }
  .share-card { position: relative; width: 286px; border-radius: 26px; overflow: hidden; color: #fff; display: flex; flex-direction: column; padding: 24px 22px 18px; background: linear-gradient(158deg, #2c0a20 0%, #120910 40%, #06201b 100%); box-shadow: 0 26px 64px -26px rgba(0,0,0,0.85), inset 0 0 0 1px rgba(255,255,255,0.06); transition: height .35s cubic-bezier(.22,1,.36,1); }
  .share-card::before { content: ''; position: absolute; top: -30px; right: -44px; width: 210px; height: 210px; border-radius: 50%; background: radial-gradient(closest-side, rgba(0,194,168,0.28), transparent 70%); filter: blur(8px); pointer-events: none; }
  .share-card.story { height: 508px; }
  .share-card.post { height: 358px; }
  .sc-top { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; }
  .sc-handle { font-size: 15px; font-weight: 700; letter-spacing: -0.2px; }
  .sc-date { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.55); font-family: 'Geist Mono', monospace; }
  .sc-mid { position: relative; z-index: 1; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 16px; }
  .sc-score { font-size: 82px; font-weight: 800; letter-spacing: -4px; line-height: 0.88; font-variant-numeric: tabular-nums; }
  .sc-band { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-top: 6px; }
  .sc-roast { margin: 0; font-size: 18px; font-weight: 700; line-height: 1.26; letter-spacing: -0.4px; color: #fff; text-wrap: pretty; }
  .sc-mood { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 600; color: rgba(255,255,255,0.82); }
  .sc-mood .face { font-size: 20px; }
  .sc-foot { position: relative; z-index: 1; font-size: 12px; font-weight: 700; letter-spacing: 0.4px; color: rgba(255,255,255,0.5); }
  .share-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 9px; margin-top: 20px; }
  .quick-btn.done { border-color: rgba(61,220,151,0.4); color: var(--good); }
  .share-hint { margin-top: 14px; font-size: 12px; line-height: 1.5; color: var(--faint); text-align: center; font-weight: 450; text-wrap: pretty; }

  @media (prefers-reduced-motion: no-preference) {
    .rin { animation: rin .55s cubic-bezier(.22,1,.36,1) both; }
  }
  @keyframes rin { from { opacity: 0; transform: translateY(13px); } to { opacity: 1; transform: none; } }
  @media (prefers-reduced-motion: reduce) { * { transition-duration: .01ms !important; animation-duration: .01ms !important; } }
</style>
</head>
<body>
  <div id="stage"><div id="scaler"><div id="root"></div></div></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script type="text/babel" src="ios-frame.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    /* ---- icons ---- */
    const ic = { width: 20, height: 20, viewBox: '0 0 24 24', fill: 'none', stroke: 'currentColor', strokeWidth: 1.8, strokeLinecap: 'round', strokeLinejoin: 'round' };
    const ChevR = ({ s = 18 }) => (<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M9 6l6 6-6 6"/></svg>);
    const LockIcon = ({ s = 16 }) => (<svg width={s} height={s} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="4.5" y="10.5" width="15" height="10" rx="2.2"/><path d="M8 10.5V7.5a4 4 0 0 1 8 0v3"/></svg>);
    const BoltIcon = () => (<svg {...ic}><path d="M13 2L4.5 13.5H11l-1 8.5L19.5 10H13z" fill="currentColor" stroke="none"/></svg>);
    const ShareIcon = () => (<svg {...ic}><circle cx="6" cy="12" r="2.4"/><circle cx="17.5" cy="6" r="2.4"/><circle cx="17.5" cy="18" r="2.4"/><path d="M8.1 10.9l7.3-3.8M8.1 13.1l7.3 3.8"/></svg>);
    const PostIcon = () => (<svg {...ic}><path d="M3 11.5L21 4l-4 16-5.5-5z"/><path d="M11.5 15L9 21l-1-6"/></svg>);
    const TrackIcon = () => (<svg {...ic}><path d="M4 16l5-5 3 3 7-7"/><path d="M16 7h4v4"/></svg>);
    const PdfIcon = () => (<svg {...ic}><path d="M7 3h7l5 5v13a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1z"/><path d="M14 3v5h5"/><path d="M9.5 13.5h5M9.5 16.5h5"/></svg>);
    const SaveIcon = () => (<svg {...ic}><path d="M12 4v10"/><path d="M8 10.5l4 4 4-4"/><path d="M5 19h14"/></svg>);
    const LinkIcon = () => (<svg {...ic}><path d="M9.5 14.5l5-5"/><path d="M10.8 7.8l1.3-1.3a3.6 3.6 0 0 1 5.1 5.1l-2.4 2.4"/><path d="M13.2 16.2l-1.3 1.3a3.6 3.6 0 0 1-5.1-5.1l2.4-2.4"/></svg>);
    const CheckIcon = () => (<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M4 12.5l5 5L20 6.5"/></svg>);
    const XIcon = () => (<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M6 6l12 12M18 6L6 18"/></svg>);
    const ArrowR = () => (<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h13M12 6l6 6-6 6"/></svg>);
    const CarIco = () => (<svg {...ic}><path d="M4.5 13l1.3-3.9A2 2 0 0 1 7.7 7.7h8.6a2 2 0 0 1 1.9 1.4L19.5 13"/><path d="M3.6 13h16.8v3.6a1 1 0 0 1-1 1H18"/><path d="M6 17.6H4.6a1 1 0 0 1-1-1V13"/><circle cx="7.5" cy="17.6" r="1.5"/><circle cx="16.5" cy="17.6" r="1.5"/></svg>);
    const CartIco = () => (<svg {...ic} width="18" height="18"><path d="M3.5 4.5h2l2 10h9.5l1.8-7.5H7"/><circle cx="9" cy="18.5" r="1.3"/><circle cx="16" cy="18.5" r="1.3"/></svg>);
    const ForkIco = () => (<svg {...ic} width="18" height="18"><path d="M6 3v7a2 2 0 0 0 4 0V3M8 10v11"/><path d="M16 3c-1.5 0-2.5 1.8-2.5 4.5S14.5 12 16 12v9"/></svg>);
    const FuelIco = () => (<svg {...ic} width="18" height="18"><rect x="4" y="4" width="9" height="16" rx="1.5"/><path d="M13 9h3l2 2v6a1.5 1.5 0 0 1-3 0v-3h-2"/><path d="M6 8h5"/></svg>);
    const ShieldIco = () => (<svg {...ic} width="18" height="18"><path d="M12 3l7 2.5V11c0 4.5-3 8-7 9.5C8 19 5 15.5 5 11V5.5z"/></svg>);

    /* ===== mock data (Jason — latest roast + current snapshot) ===== */
    const SCORE = 80;
    const BAND = { label: 'Stable', color: 'var(--stable)', hex: '#00C2A8', face: '😎', mood: 'Quietly thriving' };

    const KEY_METRICS = [
      ['Income', '$5,000', false],
      ['Expenses', '$3,700', false],
      ['Monthly savings', '+$1,300', true],
      ['Liquid savings', '$2,600', false],
      ['Total debt', '$9,800', false],
      ['Savings rate', '26%', false],
    ];
    const DOING_RIGHT = [
      'Banked +$1,300 this month',
      'Zero credit-card debt',
      'Emergency fund is forming',
      '26% savings rate — above average',
    ];
    const PROBLEMS = [
      'Emergency fund is thin — 0.7 months of expenses',
      'Car loan quietly drips 7.9% APR',
      'Dining out is creeping up — $180/mo',
    ];
    const SPENDING = [
      ['Groceries', '$420', <CartIco />],
      ['Dining out', '$180', <ForkIco />],
      ['Car insurance', '$165', <ShieldIco />],
      ['Gas', '$160', <FuelIco />],
    ];
    const BUDGET = [
      { name: 'Needs', pct: '50%', target: 2500, you: 2565, color: '#6AA6FF' },
      { name: 'Wants', pct: '30%', target: 1500, you: 1135, color: '#FFB020' },
      { name: 'Savings', pct: '20%', target: 1000, you: 1300, color: '#3DDC97' },
    ];
    const INSIGHTS = [
      'Your 26% savings rate beats most people your age — keep that pace.',
      'A one-month cushion ($3,700) is your next milestone, and you\'re ~70% there.',
      'Clearing the car loan frees $310/mo and ends the 7.9% drip for good.',
    ];

    const ROAST_SENTENCES = [
      'Bestie, who let you get responsible?',
      'Credit card in the ground, an emergency fund forming, and you actually saved this month.',
      'Respectfully — the algorithm fumbled serving a finance-roast app to someone winning this hard.',
    ];

    function ScoreRing({ val, landed }) {
      const R = 82, C = 2 * Math.PI * R;
      const frac = Math.max(0, Math.min(1, val / 100));
      const dash = (frac * C).toFixed(1);
      const cometDeg = (frac * 360).toFixed(1);
      return (
        <div className={'ring-wrap' + (landed ? ' ring-settle' : '')}>
          <div className="ring-glow" style={{ background: 'radial-gradient(closest-side, ' + BAND.hex + ', transparent 72%)', opacity: 0.26 }} />
          <svg width="150" height="150" viewBox="0 0 200 200">
            <defs>
              <filter id="rg" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="3.2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
            </defs>
            <circle cx="100" cy="100" r={R} fill="none" stroke="rgba(255,255,255,0.07)" strokeWidth="9" />
            <circle cx="100" cy="100" r={R} fill="none" stroke={BAND.hex} strokeWidth="9" strokeLinecap="round"
              strokeDasharray={dash + ' ' + C} filter="url(#rg)"
              style={{ transformBox: 'view-box', transformOrigin: '100px 100px', transform: 'rotate(-90deg)' }} />
            <circle cx="100" cy="18" r="5.5" fill="#fff" filter="url(#rg)"
              style={{ transformBox: 'view-box', transformOrigin: '100px 100px', transform: 'rotate(' + cometDeg + 'deg)', opacity: landed ? 0 : 1, transition: 'opacity .5s ease' }} />
          </svg>
          <div className="ring-center">
            <span className="ring-score" style={{ color: BAND.hex }}>{Math.round(val)}</span>
            <span className="ring-den">/ 100</span>
          </div>
        </div>
      );
    }

    function ListGroup({ children }) { return <div className="list-group">{children}</div>; }

    function ResultsScreen({ onShare }) {
      const [val, setVal] = useState(0);
      const [landed, setLanded] = useState(false);
      const [open, setOpen] = useState(false);
      const [locked, setLocked] = useState(false);

      // signature moment: count up 0 -> 80, ring fills in lockstep, settle on land
      useEffect(() => {
        let cur = 0;
        const iv = setInterval(() => {
          cur = cur + (SCORE - cur) * 0.11;
          if (Math.abs(SCORE - cur) < 0.4) { setVal(SCORE); setLanded(true); try { navigator.vibrate && navigator.vibrate(14); } catch (e) {} clearInterval(iv); }
          else setVal(cur);
        }, 28);
        return () => clearInterval(iv);
      }, []);

      const d = (i) => ({ animationDelay: (0.28 + i * 0.1) + 's' });

      return (
        <div className="screen">
          <div className="res-mask" />
          <div className="scroll">
            <div className="res-top">
              <BackChevron href="Am I Broke - HomeTabs.html" label="Back" />
            </div>

            {/* 1 — score hero */}
            <div className="score-hero rin" style={d(0)}>
              <ScoreRing val={val} landed={landed} />
              <div className="hero-meta">
                <span className="band-pill" style={{ color: BAND.hex, background: 'rgba(0,194,168,0.12)', border: '1px solid rgba(0,194,168,0.3)' }}>
                  <span className="bdot" style={{ background: BAND.hex, boxShadow: '0 0 8px ' + BAND.hex }} />{BAND.label}
                </span>
                <span className="conf-badge">
                  <span className="bars"><i style={{ height: 5 }} /><i style={{ height: 8 }} /><i style={{ height: 12 }} /></span>
                  Data confidence: <b>High</b>
                </span>
              </div>
            </div>

            {/* 2 — roast card */}
            <div className="roast-card rin" style={d(1)}>
              <span className="qmark">&rdquo;</span>
              <div className="roast-label">Roast</div>
              <p className="roast-text">Bestie, who let you get responsible? Credit card in the ground, an emergency fund forming, and you actually saved this month. Respectfully — the algorithm fumbled serving a finance-roast app to someone <span className="hl">winning this hard</span>.</p>
            </div>

            {/* 3 — #1 thing to fix */}
            <div className="fix-card rin" style={d(2)}>
              <span className="fix-ico"><BoltIcon /></span>
              <div className="fix-body">
                <div className="fix-label">#1 thing to fix</div>
                <div className="fix-action">Throw your $1,300 surplus at the 7.9% car loan.</div>
                <div className="fix-impact">Est. monthly improvement: +$310/mo</div>
              </div>
            </div>

            {/* 4 — primary action + quick actions */}
            <button className={'cta-primary rin' + (locked ? ' locked' : '')} type="button" style={d(3)}>
              {locked
                ? <><LockIcon s={17} /> Unlock 90-Day Action Plan — <span className="price">$4.99</span></>
                : <>View 90-Day Action Plan <ChevR s={18} /></>}
            </button>
            <div className="quick-row rin" style={d(4)}>
              <button className="quick-btn" type="button" onClick={onShare}><ShareIcon /><span className="ql">Share</span></button>
              <button className="quick-btn" type="button"><PostIcon /><span className="ql">Post</span></button>
              <button className="quick-btn" type="button"><TrackIcon /><span className="ql">Track</span></button>
              <button className="quick-btn" type="button"><PdfIcon /><span className="ql">PDF</span></button>
            </div>

            {/* 5 — full breakdown (collapsed by default) */}
            <button className={'bd-toggle rin' + (open ? ' open' : '')} type="button" onClick={() => setOpen((o) => !o)} style={d(5)}>
              <span>
                See the full breakdown
                <span className="bd-sub">{open ? 'Tap to hide the homework' : 'Metrics, debts, budget & insights'}</span>
              </span>
              <span className="chev"><ChevR s={18} /></span>
            </button>

            {open && (
              <div className="breakdown">
                <div className="section-label rin" style={{ animationDelay: '0s' }}>The Breakdown</div>
                <div className="glass-card rin"><p className="para">You're genuinely ahead of the curve, Jason. <b>$1,300</b> of every paycheck survives the month, you're carrying <b>zero credit-card debt</b>, and your savings are climbing. The only real drag is a thin cash cushion and a car loan skimming <b>7.9%</b>. Clear those two and you're not just "stable" — you're winning.</p></div>

                <div className="section-label">Key Metrics</div>
                <ListGroup>
                  {KEY_METRICS.map(([k, v, pos]) => (
                    <div className="lg-row" key={k}><span className="lg-label">{k}</span><span className={'lg-val' + (pos ? ' pos' : '')}>{v}</span></div>
                  ))}
                </ListGroup>

                <div className="section-label">Emotional Status</div>
                <div className="glass-card">
                  <div className="emo">
                    <span className="emo-face">{BAND.face}</span>
                    <div><div className="emo-label">{BAND.mood}</div><div className="emo-sub">Calm, a little smug, and earning it.</div></div>
                  </div>
                </div>

                <div className="section-label">What You're Doing Right</div>
                <div className="glass-card">
                  <div className="marklist">
                    {DOING_RIGHT.map((t) => (
                      <div className="mark-row" key={t}><span className="mark-ico good"><CheckIcon /></span><span className="mark-text">{t}</span></div>
                    ))}
                  </div>
                </div>

                <div className="section-label">Biggest Problems</div>
                <div className="glass-card">
                  <div className="marklist">
                    {PROBLEMS.map((t) => (
                      <div className="mark-row" key={t}><span className="mark-ico bad"><XIcon /></span><span className="mark-text">{t}</span></div>
                    ))}
                  </div>
                </div>

                <div className="section-label">Debts</div>
                <ListGroup>
                  <div className="debt-row">
                    <span className="debt-ico"><CarIco /></span>
                    <div className="debt-body"><div className="debt-name">Car Loan</div><div className="debt-meta">Auto · 7.9% APR · $310/mo</div></div>
                    <span className="debt-bal">$9,800</span>
                  </div>
                  <button className={'debt-cta' + (locked ? ' locked' : '')} type="button">
                    {locked
                      ? <span><LockIcon s={14} /> Upgrade to Deep Dive — <span className="price">$4.99</span></span>
                      : <span>View Debt Payoff Plan</span>}
                    <ChevR s={16} />
                  </button>
                </ListGroup>

                <div className="section-label">What You Mentioned Spending</div>
                <ListGroup>
                  {SPENDING.map(([k, v, glyph]) => (
                    <div className="lg-row" key={k}><span className="lg-label with-ico"><span className="lg-ico">{glyph}</span>{k}</span><span className="lg-val">{v}</span></div>
                  ))}
                </ListGroup>

                <div className="section-label">Recommended Budget · 50/30/20</div>
                <div className="glass-card">
                  {BUDGET.map((b) => {
                    const over = b.you > b.target;
                    const w = Math.min(100, Math.round((b.you / (b.target * 1.6)) * 100));
                    const tx = Math.min(100, Math.round((b.target / (b.target * 1.6)) * 100));
                    return (
                      <div className="bud-row" key={b.name}>
                        <div className="bud-top">
                          <span className="bud-name">{b.name} <span>{b.pct}</span></span>
                          <span className="bud-nums">target <b>${b.target.toLocaleString()}</b> · you <b style={{ color: over && b.name !== 'Savings' ? 'var(--bad)' : (b.name === 'Savings' ? 'var(--good)' : '#fff') }}>${b.you.toLocaleString()}</b></span>
                        </div>
                        <div className="bud-track">
                          <div className="bud-fill" style={{ width: w + '%', background: 'var(--neon)' }} />
                          <div className="bud-target" style={{ left: tx + '%' }} />
                        </div>
                      </div>
                    );
                  })}
                </div>

                <div className="section-label">Key Insights</div>
                <div className="glass-card">
                  {INSIGHTS.map((t) => (
                    <div className="insight" key={t}><span className="iarr"><ArrowR /></span><span className="itext">{t}</span></div>
                  ))}
                </div>
              </div>
            )}

            <div className="disclaimer">Estimates based on what you told us — not financial advice.</div>
          </div>
        </div>
      );
    }

    function ShareScreen({ onBack }) {
      const [fmt, setFmt] = useState('story');
      const [saved, setSaved] = useState(false);
      const [copied, setCopied] = useState(false);
      const roast = ROAST_SENTENCES.slice(0, fmt === 'story' ? 2 : 1).join(' ');
      return (
        <div className="screen">
          <div className="scroll">
            <div className="res-top">
              <BackChevron onClick={onBack} label="Back to roast" />
              <span className="share-title">Share Result</span>
              <span style={{ width: 36 }} />
            </div>

            <div className="seg-ctrl">
              <button type="button" className={fmt === 'story' ? 'on' : ''} onClick={() => setFmt('story')}>Story 9:16</button>
              <button type="button" className={fmt === 'post' ? 'on' : ''} onClick={() => setFmt('post')}>Post 4:5</button>
            </div>

            <div className="share-stage">
              <div className={'share-card ' + fmt}>
                <div className="sc-top"><span className="sc-handle">@jason</span><span className="sc-date">Jun 2026</span></div>
                <div className="sc-mid">
                  <div>
                    <div className="sc-score" style={{ color: BAND.hex }}>{SCORE}</div>
                    <div className="sc-band" style={{ color: BAND.hex }}>{BAND.label}</div>
                  </div>
                  <p className="sc-roast">{roast}</p>
                  <div className="sc-mood"><span className="face">{BAND.face}</span> {BAND.mood}</div>
                </div>
                <div className="sc-foot">aibroke.app</div>
              </div>
            </div>

            <div className="share-actions">
              <button className="quick-btn" type="button"><ShareIcon /><span className="ql">Share</span></button>
              <button className={'quick-btn' + (saved ? ' done' : '')} type="button" onClick={() => setSaved(true)}>
                {saved ? <CheckIcon /> : <SaveIcon />}<span className="ql">{saved ? 'Saved' : 'Save'}</span>
              </button>
              <button className={'quick-btn' + (copied ? ' done' : '')} type="button" onClick={() => setCopied(true)}>
                {copied ? <CheckIcon /> : <LinkIcon />}<span className="ql">{copied ? 'Copied' : 'Copy Link'}</span>
              </button>
            </div>

            <div className="share-hint">Share opens the system sheet — post anywhere, or save the image. The roast lives on the card.</div>
          </div>
        </div>
      );
    }

    function Root() {
      const [share, setShare] = useState(false);
      return (<IOSDevice dark>{share ? <ShareScreen onBack={() => setShare(false)} /> : <ResultsScreen onShare={() => setShare(true)} />}</IOSDevice>);
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Root />);

    function fit() {
      const W = 402, H = 874, pad = 36;
      const s = Math.min((window.innerWidth - pad) / W, (window.innerHeight - pad) / H, 1);
      document.getElementById('scaler').style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fit); fit();
  </script>
</body>
</html>
