<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Am I Broke? — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;800&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0B0B0F;
    --card: #16161F;
    --card-2: #1C1C24;
    --neon: #FF007A;
    --danger: #FF5470;
    --line: rgba(255,255,255,0.08);
    --text: #FFFFFF;
    --muted: rgba(255,255,255,0.50);
    --faint: rgba(255,255,255,0.34);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; height: 100%;
    background: radial-gradient(900px 600px at 50% -10%, #15151d 0%, #0a0a0d 55%, #07070a 100%);
    font-family: 'Geist', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  #stage { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; overflow: hidden; }
  #scaler { transform-origin: center center; }

  .screen {
    height: 100%; width: 100%; background: var(--bg);
    display: flex; flex-direction: column; position: relative; color: var(--text);
    overflow: hidden;
  }
  .scroll {
    flex: 1; overflow-y: auto; overflow-x: hidden;
    padding: 64px 24px 120px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none; -ms-overflow-style: none;
  }
  .scroll::-webkit-scrollbar { width: 0; height: 0; display: none; }

  /* ---------- header ---------- */
  .header { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .greet-eyebrow { font-size: 13px; color: var(--muted); font-weight: 500; letter-spacing: -0.1px; }
  .greet-name { font-size: 23px; font-weight: 800; letter-spacing: -0.8px; margin-top: 2px; }
  .vibe-pill {
    display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0;
    padding: 7px 12px 7px 10px; border-radius: 9999px; margin-top: 4px;
    background: rgba(255,0,122,0.10); border: 1px solid rgba(255,0,122,0.28);
    font-size: 12px; font-weight: 600; color: #ff5fa6; letter-spacing: -0.1px;
    white-space: nowrap;
  }
  .vibe-pill .emo { font-size: 12.5px; }

  /* ---------- score gauge ---------- */
  .gauge-wrap {
    position: relative; display: flex; flex-direction: column; align-items: center;
    margin-top: 30px; margin-bottom: 4px;
  }
  .gauge-wrap::before {
    content: ''; position: absolute; top: 18px; width: 230px; height: 230px; border-radius: 50%;
    background: radial-gradient(closest-side, rgba(0,194,168,0.22), transparent 72%);
    filter: blur(6px); pointer-events: none;
  }
  .gauge { position: relative; width: 218px; height: 218px; }
  .gauge svg { display: block; }
  .gauge .arc { transition: stroke-dashoffset 1.2s cubic-bezier(.22,1,.36,1); }
  @media (prefers-reduced-motion: no-preference) {
    .gauge .arc { animation: draw 1.3s cubic-bezier(.22,1,.36,1) 1; }
  }
  @keyframes draw { from { stroke-dashoffset: 553; } }
  .gauge-center {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 0;
  }
  .score-num { font-size: 64px; font-weight: 800; letter-spacing: -3px; line-height: 0.9; }
  .score-den { font-size: 15px; font-weight: 600; color: var(--faint); margin-top: 7px; font-family: 'Geist Mono', monospace; letter-spacing: 0; }
  .score-status {
    margin-top: 12px; display: inline-flex; align-items: center; gap: 7px;
    font-size: 13px; font-weight: 600; color: #fff;
    padding: 5px 12px; border-radius: 9999px;
    background: rgba(255,255,255,0.05); border: 1px solid var(--line);
  }
  .score-status .dot { width: 7px; height: 7px; border-radius: 50%; background: #00C2A8; box-shadow: 0 0 8px rgba(0,194,168,0.8); }

  /* ---------- tab stubs ---------- */
  .tab-stub { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 9px; padding: 0 24px 120px; text-align: center; }
  .tab-stub .stub-box { width: 56px; height: 56px; border-radius: 16px; border: 1px dashed rgba(255,255,255,0.18); background: rgba(255,255,255,0.02); margin-bottom: 8px; }
  .tab-stub .stub-title { font-size: 24px; font-weight: 800; letter-spacing: -0.8px; color: #fff; }
  .tab-stub .stub-note { font-family: 'Geist Mono', monospace; font-size: 12.5px; font-weight: 500; color: var(--faint); }

  /* ---------- Financials tab ---------- */
  .fin-section { margin-top: 30px; }
  .fin-section.first { margin-top: 2px; }
  .fin-h2 { font-size: 25px; font-weight: 800; letter-spacing: -0.8px; color: #fff; margin: 0 0 13px; }
  .fin-sub-h { font-size: 12.5px; color: var(--muted); margin: -7px 0 14px; font-weight: 500; }

  /* bleed (cash flow) */
  .bleed-card { background: var(--card); border: 1px solid var(--line); border-radius: 20px; padding: 20px 20px 18px; }
  .bleed-row { display: flex; align-items: flex-end; justify-content: space-between; }
  .bleed-col { display: flex; flex-direction: column; gap: 6px; }
  .bleed-col.out { text-align: right; }
  .bleed-label { font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--faint); }
  .bleed-num { font-size: 33px; font-weight: 800; letter-spacing: -1.4px; font-family: 'Geist Mono', monospace; color: #fff; line-height: 1; }
  .bleed-col.out .bleed-num { color: rgba(255,255,255,0.5); }
  .bleed-slash { font-size: 26px; color: rgba(255,255,255,0.16); font-weight: 300; padding-bottom: 2px; }
  .flow-bar { margin-top: 20px; height: 10px; border-radius: 99px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .flow-out { height: 100%; background: var(--neon); border-radius: 99px; box-shadow: 0 0 12px rgba(255,0,122,0.55); }
  .bleed-foot { margin-top: 13px; font-size: 13px; font-weight: 500; color: var(--muted); }
  .bleed-foot b { color: #fff; font-weight: 800; font-family: 'Geist Mono', monospace; }

  /* hit list */
  .hit-list { display: flex; flex-direction: column; gap: 10px; }
  .hit-row { display: flex; align-items: center; gap: 13px; background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 13px 15px; }
  .hit-ico { width: 42px; height: 42px; border-radius: 12px; background: rgba(255,255,255,0.04); border: 1px solid var(--line); display: grid; place-items: center; color: rgba(255,255,255,0.72); flex-shrink: 0; }
  .hit-row.target .hit-ico { background: rgba(255,0,122,0.12); border-color: rgba(255,0,122,0.3); color: var(--neon); }
  .hit-body { flex: 1; min-width: 0; }
  .hit-name-row { display: flex; align-items: center; gap: 8px; }
  .hit-name { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.2px; }
  .hit-tag { font-size: 9px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--neon); background: rgba(255,0,122,0.14); border: 1px solid rgba(255,0,122,0.3); border-radius: 6px; padding: 2px 6px; }
  .hit-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .hit-amt { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
  .hit-val { font-size: 17px; font-weight: 800; font-family: 'Geist Mono', monospace; letter-spacing: -0.5px; color: #fff; }
  .hit-row.target .hit-val { color: var(--neon); }
  .hit-cad { font-size: 11px; color: var(--faint); font-weight: 600; }

  /* lab (tools) */
  .lab-list { display: flex; flex-direction: column; gap: 11px; }
  .lab-card { display: flex; align-items: center; gap: 14px; background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 15px 16px; cursor: pointer; transition: border-color .2s ease, transform .12s ease; -webkit-tap-highlight-color: transparent; text-align: left; font-family: inherit; }
  .lab-card:hover { border-color: rgba(255,0,122,0.35); }
  .lab-card:active { transform: scale(.99); }
  .lab-ico { width: 44px; height: 44px; border-radius: 13px; background: rgba(255,0,122,0.1); border: 1px solid rgba(255,0,122,0.2); display: grid; place-items: center; color: var(--neon); flex-shrink: 0; }
  .lab-body { flex: 1; min-width: 0; }
  .lab-title { font-size: 15.5px; font-weight: 700; color: #fff; letter-spacing: -0.2px; display: block; }
  .lab-sub { font-size: 12.5px; color: var(--muted); margin-top: 3px; line-height: 1.35; }
  .lab-chev { color: var(--faint); flex-shrink: 0; display: flex; }

  /* lab — coming soon state */
  .lab-title-row { display: flex; align-items: center; gap: 8px; }
  .lab-card.soon { cursor: default; opacity: 0.5; }
  .lab-card.soon:hover { border-color: var(--line); }
  .lab-card.soon:active { transform: none; }
  .lab-card.soon .lab-ico { background: rgba(255,255,255,0.04); border-color: var(--line); color: var(--faint); }
  .soon-badge { font-size: 9px; font-weight: 800; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); background: rgba(255,255,255,0.06); border: 1px solid var(--line); border-radius: 6px; padding: 2px 7px; }

  /* vitals (derived health metrics) */
  .vitals { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .metric.thin .m-ico { background: var(--danger); box-shadow: 0 0 8px rgba(255,84,112,0.7); }
  .metric.thin .m-foot { color: var(--danger); }
  .metric.good .m-ico { background: #3DDC97; box-shadow: 0 0 8px rgba(61,220,151,0.6); }
  .metric.good .m-foot { color: #3DDC97; }

  /* where your money goes (spending breakdown) */
  .spend-card { background: var(--card); border: 1px solid var(--line); border-radius: 20px; padding: 19px 19px 17px; }
  .spend-item { margin-bottom: 16px; }
  .spend-item:last-child { margin-bottom: 0; }
  .spend-top { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 8px; }
  .spend-name { font-size: 13.5px; font-weight: 600; color: rgba(255,255,255,0.84); letter-spacing: -0.2px; }
  .spend-amt { font-size: 13.5px; font-weight: 700; font-family: 'Geist Mono', monospace; color: #fff; letter-spacing: -0.3px; }
  .spend-track { height: 8px; border-radius: 99px; background: rgba(255,255,255,0.07); overflow: hidden; }
  .spend-fill { height: 100%; border-radius: 99px; background: var(--neon); box-shadow: 0 0 10px rgba(255,0,122,0.4); }
  .spend-foot { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--line); display: flex; align-items: baseline; justify-content: space-between; }
  .spend-foot .lbl { font-size: 12px; font-weight: 600; color: var(--muted); }
  .spend-foot .tot { font-size: 14px; font-weight: 800; font-family: 'Geist Mono', monospace; color: #fff; letter-spacing: -0.4px; }

  /* tap-to-edit figures */
  .bleed-edit { background: none; border: none; padding: 0; font-family: inherit; cursor: pointer; display: flex; flex-direction: column; gap: 6px; align-items: flex-start; -webkit-tap-highlight-color: transparent; transition: transform .12s ease; }
  .bleed-col.out .bleed-edit { align-items: flex-end; }
  .bleed-edit:active { transform: scale(.97); }
  .bleed-edit .bleed-label { display: inline-flex; align-items: center; gap: 5px; }
  .pencil { color: var(--faint); display: inline-flex; flex-shrink: 0; }
  .vital-savings { width: 100%; display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 12px 15px; cursor: pointer; font-family: inherit; text-align: left; -webkit-tap-highlight-color: transparent; transition: border-color .2s, transform .12s ease; }
  .vital-savings:hover { border-color: rgba(255,0,122,0.35); }
  .vital-savings:active { transform: scale(.99); }
  .vital-savings .vs-label { font-size: 13px; font-weight: 600; color: var(--muted); display: inline-flex; align-items: center; gap: 7px; }
  .vital-savings .vs-dot { width: 8px; height: 8px; border-radius: 50%; background: #6AA6FF; box-shadow: 0 0 8px rgba(106,166,255,0.55); flex-shrink: 0; }
  .vital-savings .vs-val { font-size: 17px; font-weight: 800; font-family: 'Geist Mono', monospace; letter-spacing: -0.4px; color: #fff; display: inline-flex; align-items: center; gap: 7px; }
  .vital-savings .vs-val .pencil { color: var(--faint); }
  .spend-cta { width: 100%; display: flex; align-items: center; justify-content: center; gap: 7px; margin-top: 12px; padding: 13px; border-radius: 14px; background: rgba(255,255,255,0.03); border: 1px solid var(--line); color: var(--neon); font-size: 14px; font-weight: 700; font-family: inherit; letter-spacing: -0.2px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background .2s, border-color .2s, transform .12s ease; }
  .spend-cta:hover { background: rgba(255,0,122,0.08); border-color: rgba(255,0,122,0.3); }
  .spend-cta:active { transform: scale(.99); }

  /* subscriptions summary card */
  .sub-summary { width: 100%; display: flex; align-items: center; gap: 14px; background: var(--card); border: 1px solid var(--line); border-radius: 18px; padding: 15px 16px; cursor: pointer; font-family: inherit; text-align: left; transition: border-color .2s, transform .14s ease; -webkit-tap-highlight-color: transparent; }
  .sub-summary:hover { border-color: rgba(255,0,122,0.35); }
  .sub-summary:active { transform: scale(.99); }
  .sub-body { flex: 1; min-width: 0; }
  .sub-title { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.2px; display: block; }
  .sub-sub { font-size: 12.5px; color: var(--muted); margin-top: 3px; display: block; }
  .sub-trail { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .sub-amt { font-size: 20px; font-weight: 800; font-family: 'Geist Mono', monospace; letter-spacing: -0.5px; line-height: 1; color: #fff; flex-shrink: 0; }
  .sub-amt span { font-size: 12px; color: var(--muted); font-weight: 600; }

  /* ======== Subscriptions manager screen ======== */
  .sub-topbar { display: flex; align-items: center; margin: -8px 0 18px; }
  .back-btn { display: inline-flex; align-items: center; gap: 4px; background: none; border: none; color: var(--muted); font-size: 14px; font-weight: 600; font-family: inherit; cursor: pointer; padding: 6px 8px 6px 0; letter-spacing: -0.2px; -webkit-tap-highlight-color: transparent; transition: color .2s; }
  .back-btn:hover { color: #fff; }

  .sub-hero { position: relative; background: var(--card); border: 1px solid var(--line); border-radius: 24px; padding: 26px 22px 24px; text-align: center; overflow: hidden; }
  .sub-hero::before { content: ''; position: absolute; top: -40px; left: 50%; transform: translateX(-50%); width: 260px; height: 200px; border-radius: 50%; background: radial-gradient(closest-side, rgba(255,0,122,0.16), transparent 70%); pointer-events: none; }
  .sub-hero-label { position: relative; font-size: 11px; font-weight: 700; letter-spacing: 1.4px; text-transform: uppercase; color: var(--faint); }
  .sub-hero-num { position: relative; font-size: 62px; font-weight: 800; letter-spacing: -3px; line-height: 0.95; margin-top: 10px; font-family: 'Geist Mono', monospace; color: #fff; }
  .sub-hero-num .mo { font-size: 22px; color: var(--muted); font-weight: 700; letter-spacing: -0.5px; }
  .sub-hero-sec { position: relative; font-size: 14px; font-weight: 600; color: var(--muted); margin-top: 11px; font-family: 'Geist Mono', monospace; }
  .sub-hero-sec b { color: rgba(255,255,255,0.78); }

  .cat-breakdown { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 16px; justify-content: center; }
  .cat-pill { display: inline-flex; align-items: center; gap: 7px; padding: 7px 12px; border-radius: 9999px; background: var(--card-2); border: 1px solid var(--line); font-size: 12px; font-weight: 600; color: var(--muted); letter-spacing: -0.1px; }
  .cat-pill b { color: #fff; font-family: 'Geist Mono', monospace; font-weight: 700; }

  .add-sub { width: 100%; display: flex; align-items: center; justify-content: center; gap: 9px; padding: 15px; border-radius: 16px; background: rgba(255,0,122,0.10); border: 1px dashed rgba(255,0,122,0.42); color: var(--neon); font-size: 14.5px; font-weight: 700; font-family: inherit; letter-spacing: -0.2px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: background .2s, transform .12s ease; }
  .add-sub:hover { background: rgba(255,0,122,0.17); }
  .add-sub:active { transform: scale(.99); }

  .sub-list { display: flex; flex-direction: column; gap: 10px; }
  .sub-row { display: flex; align-items: center; gap: 13px; background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 13px 15px; cursor: pointer; width: 100%; text-align: left; font-family: inherit; -webkit-tap-highlight-color: transparent; transition: border-color .2s, transform .12s ease; }
  .sub-row:hover { border-color: rgba(255,255,255,0.16); }
  .sub-row:active { transform: scale(.99); }
  .sub-r-body { flex: 1; min-width: 0; }
  .sub-r-name { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.2px; }
  .sub-r-meta { font-size: 12px; color: var(--muted); margin-top: 3px; }
  .sub-cost { display: flex; flex-direction: column; align-items: flex-end; flex-shrink: 0; }
  .sub-cost-main { font-size: 16px; font-weight: 800; font-family: 'Geist Mono', monospace; letter-spacing: -0.5px; line-height: 1.1; color: #fff; }
  .sub-cost-main .suf { font-size: 11px; color: var(--faint); font-weight: 600; }
  .sub-cost-eq { font-size: 10.5px; color: var(--faint); font-weight: 600; margin-top: 2px; font-family: 'Geist Mono', monospace; }

  .sub-empty { text-align: center; padding: 56px 24px 40px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .sub-empty .e-ico { width: 60px; height: 60px; border-radius: 18px; background: rgba(255,0,122,0.10); border: 1px solid rgba(255,0,122,0.28); display: grid; place-items: center; color: var(--neon); margin-bottom: 12px; }
  .sub-empty .e-title { font-size: 19px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
  .sub-empty .e-note { font-size: 13px; color: var(--muted); font-weight: 500; max-width: 230px; line-height: 1.45; }

  /* ---- bottom sheet (add / edit form) ---- */
  .sheet-overlay { position: absolute; inset: 0; z-index: 50; background: rgba(7,7,10,0.55); backdrop-filter: blur(16px) saturate(115%); -webkit-backdrop-filter: blur(16px) saturate(115%); opacity: 0; pointer-events: none; transition: opacity .3s ease; }
  .sheet-overlay.show { opacity: 1; pointer-events: auto; }
  .sheet { position: absolute; left: 0; right: 0; bottom: 0; z-index: 55; background: #16161F; border-top-left-radius: 28px; border-top-right-radius: 28px; border: 1px solid var(--line); border-bottom: none; padding: 14px 22px 26px; transform: translateY(101%); transition: transform .38s cubic-bezier(.22,1,.36,1); box-shadow: 0 -24px 64px rgba(0,0,0,0.6); max-height: 90%; overflow-y: auto; }
  .sheet.show { transform: translateY(0); }
  .sheet::-webkit-scrollbar { width: 0; }
  .sheet-grab { width: 40px; height: 4px; border-radius: 99px; background: rgba(255,255,255,0.18); margin: 2px auto 18px; }
  .sheet-title { font-size: 21px; font-weight: 800; letter-spacing: -0.6px; color: #fff; margin: 0 0 20px; }

  .field { margin-bottom: 18px; }
  .field-label { font-size: 11px; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; color: var(--faint); margin-bottom: 9px; display: block; }
  .input { width: 100%; background: var(--card-2); border: 1px solid var(--line); border-radius: 14px; padding: 14px 15px; color: #fff; font-size: 16px; font-family: inherit; font-weight: 600; letter-spacing: -0.2px; }
  .input::placeholder { color: var(--faint); font-weight: 500; }
  .input:focus { outline: none; border-color: rgba(255,0,122,0.5); }
  .input[type=number] { -moz-appearance: textfield; appearance: textfield; }
  .input::-webkit-outer-spin-button, .input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  /* spending category rows (light editor) */
  .spend-fg { display: flex; flex-direction: column; gap: 10px; background: var(--card); border: 1px solid var(--line); border-radius: 16px; padding: 13px 15px; }
  .spend-row-top { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .sp-name { font-size: 15px; font-weight: 700; color: #fff; letter-spacing: -0.2px; }
  .sp-trail { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .sp-amt { font-size: 16px; font-weight: 800; font-family: 'Geist Mono', monospace; letter-spacing: -0.4px; color: #fff; }
  .cost-wrap { position: relative; }
  .cost-wrap .cur { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); font-size: 16px; font-weight: 700; color: var(--muted); font-family: 'Geist Mono', monospace; pointer-events: none; }
  .cost-wrap .input { padding-left: 30px; font-family: 'Geist Mono', monospace; }

  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { padding: 9px 14px; border-radius: 9999px; background: var(--card-2); border: 1px solid var(--line); color: var(--muted); font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer; letter-spacing: -0.1px; -webkit-tap-highlight-color: transparent; transition: background .15s, border-color .15s, color .15s; }
  .chip:hover { border-color: rgba(255,255,255,0.2); }
  .chip.on { background: rgba(255,0,122,0.15); border-color: rgba(255,0,122,0.45); color: #ff5fa6; }

  .sheet-actions { display: flex; gap: 10px; margin-top: 26px; }
  .btn { padding: 15px; border-radius: 14px; border: none; font-size: 15px; font-weight: 700; font-family: inherit; letter-spacing: -0.2px; cursor: pointer; -webkit-tap-highlight-color: transparent; transition: transform .12s ease, opacity .2s, background .2s; }

      { key: 'monthly', label: 'Monthly', noun: 'Monthly', suf: '/mo' },
      { key: 'quarterly', label: 'Quarterly', noun: 'Quarterly', suf: '/qtr' },
      { key: 'semiannual', label: '6-Month', noun: 'Semiannual', suf: '/6mo' },
      { key: 'yearly', label: 'Yearly', noun: 'Yearly', suf: '/yr' },
    ];
    const CAD_BY_KEY = Object.fromEntries(CADENCES.map((c) => [c.key, c]));
    const CAT_PRESETS = ['Streaming', 'Music', 'Gaming', 'Software', 'Shopping', 'Food delivery', 'Fitness', 'Health', 'Storage'];

    const INITIAL_SUBS = [
      { id: 1, name: 'Spotify Premium', cost: 11.99, cadence: 'monthly', category: 'Music' },
      { id: 2, name: 'Netflix', cost: 15.49, cadence: 'monthly', category: 'Streaming' },
      { id: 3, name: 'Amazon Prime', cost: 14.99, cadence: 'monthly', category: 'Shopping' },
      { id: 4, name: 'iCloud+ 200GB', cost: 2.99, cadence: 'monthly', category: 'Storage' },
      { id: 5, name: 'DoorDash DashPass', cost: 9.99, cadence: 'monthly', category: 'Food delivery' },
      { id: 6, name: 'Planet Fitness', cost: 24.99, cadence: 'monthly', category: 'Fitness' },
      { id: 7, name: 'Max', cost: 99.99, cadence: 'yearly', category: 'Streaming' },
    ];

    const fmt = (n) => {
      const r = Math.round(n * 100) / 100;
      return Number.isInteger(r) ? String(r) : r.toFixed(2);
    };
    const monthlyOf = (s) => s.cost * (MO_FACTOR[s.cadence] || 1);
    const catGlyph = (cat) => {
      const c = (cat || '').toLowerCase();
      if (c.includes('music')) return <MusicGlyph />;
      if (c.includes('stream')) return <PlayGlyph />;
      if (c.includes('gaming') || c.includes('game')) return <GameGlyph />;
      if (c.includes('software') || c.includes('saas') || c.includes('app')) return <CodeGlyph />;
      if (c.includes('shop')) return <CartGlyph />;
      if (c.includes('storage') || c.includes('cloud')) return <CloudGlyph />;
      if (c.includes('food') || c.includes('deliver') || c.includes('dining')) return <BagGlyph />;
      if (c.includes('fitness') || c.includes('gym')) return <GymGlyph />;
      if (c.includes('health') || c.includes('medical') || c.includes('wellness')) return <HeartGlyph />;
      return <RepeatGlyph />;
    };
    // trim + case-insensitive merge into an existing/preset bucket so the breakdown doesn't fragment
    const normalizeCat = (input, subs) => {
      const t = (input || '').trim();
      if (!t) return 'Other';
      const low = t.toLowerCase();
      const preset = CAT_PRESETS.find((c) => c.toLowerCase() === low);
      if (preset) return preset;
      const existing = subs.map((s) => s.category).find((c) => c && c.toLowerCase() === low);
      return existing || t;
    };

    function SwipeRow({ sub, onEdit, onAskDelete }) {
      const cad = CAD_BY_KEY[sub.cadence];
      const [dx, setDx] = useState(0);
      const [live, setLive] = useState(false);
      const startX = React.useRef(0);
      const base = React.useRef(0);
      const moved = React.useRef(false);
      const dragging = React.useRef(false);
      const OPEN = -84;
      const down = (e) => {
        dragging.current = true; setLive(true); moved.current = false;
        startX.current = e.clientX; base.current = dx;
        try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {}
      };
      const move = (e) => {
        if (!dragging.current) return;
        let nd = base.current + (e.clientX - startX.current);
        if (nd > 0) nd = 0;
        if (nd < OPEN - 24) nd = OPEN - 24;
        if (Math.abs(e.clientX - startX.current) > 6) moved.current = true;
        setDx(nd);
      };
      const up = () => {
        if (!dragging.current) return;
        dragging.current = false; setLive(false);
        setDx((d) => (d <= OPEN / 2 ? OPEN : 0));
      };
      const click = () => {
        if (moved.current) { moved.current = false; return; }
        if (dx !== 0) { setDx(0); return; }
        onEdit(sub);
      };
      return (
        <div className="swipe-wrap">
          <button className="swipe-del" type="button" tabIndex={-1}
            style={{ opacity: dx < -2 ? 1 : 0, transition: 'opacity .15s ease' }}
            onClick={() => { setDx(0); onAskDelete(sub); }} aria-label={'Delete ' + sub.name}>
            <TrashGlyph />
          </button>
          <div className={'sub-row swipe-fg' + (live ? ' live' : '')} style={{ transform: 'translateX(' + dx + 'px)' }}
            role="button" tabIndex={0}
            onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerCancel={up}
            onClick={click} onKeyDown={(e) => { if (e.key === 'Enter') onEdit(sub); }}>
            <span className="hit-ico">{catGlyph(sub.category)}</span>
            <span className="sub-r-body">
              <div className="sub-r-name">{sub.name}</div>
              <div className="sub-r-meta">{sub.category || 'Other'} · {cad.noun}</div>
            </span>
            <span className="sub-trail">
              <span className="sub-cost">
                <span className="sub-cost-main">${fmt(sub.cost)}<span className="suf">{cad.suf}</span></span>
                {sub.cadence !== 'monthly' && <span className="sub-cost-eq">~${fmt(monthlyOf(sub))}/mo</span>}
              </span>
              <span className="sub-r-chev"><Chev s={18} /></span>
            </span>
          </div>
        </div>
      );
    }

    function SubscriptionsScreen({ onBack }) {
      const [subs, setSubs] = useState(INITIAL_SUBS);
      const [form, setForm] = useState(null); // null = sheet closed
      const [confirmDel, setConfirmDel] = useState(null);
      const [scrolled, setScrolled] = useState(false);

      const totalMonthly = subs.reduce((a, s) => a + monthlyOf(s), 0);
      const heroMo = Math.round(totalMonthly);
      const heroYr = Math.round(totalMonthly * 12);

      // per-category monthly totals, desc
      const byCat = {};
      subs.forEach((s) => { byCat[s.category || 'Other'] = (byCat[s.category || 'Other'] || 0) + monthlyOf(s); });
      const cats = Object.entries(byCat).sort((a, b) => b[1] - a[1]);
      // biggest spenders first (by monthly-equivalent)
      const sorted = [...subs].sort((a, b) => monthlyOf(b) - monthlyOf(a));

      const openAdd = () => setForm({ id: null, name: '', cost: '', cadence: 'monthly', category: '' });
      const openEdit = (s) => setForm({ id: s.id, name: s.name, cost: String(s.cost), cadence: s.cadence, category: s.category });
      const close = () => setForm(null);
      const askDelete = (s) => { setForm(null); setConfirmDel(s); };
      const confirmDelete = () => { if (confirmDel) setSubs((xs) => xs.filter((s) => s.id !== confirmDel.id)); setConfirmDel(null); };

      const valid = form && form.name.trim() && parseFloat(form.cost) > 0;
      const save = () => {
        if (!valid) return;
        const rec = { name: form.name.trim(), cost: parseFloat(form.cost), cadence: form.cadence, category: normalizeCat(form.category, subs) };
        if (form.id == null) {
          setSubs((xs) => [...xs, { id: Date.now(), ...rec }]);
        } else {
          setSubs((xs) => xs.map((s) => (s.id === form.id ? { id: form.id, ...rec } : s)));
        }
        close();
      };

      return (
        <>
          <header className={'pinned-bar' + (scrolled ? ' scrolled' : '')}>
            <BackChevron onClick={onBack} label="Back to Financials" />
            <span className="pinned-title">Subscriptions</span>
            <button className="pinned-add" type="button" onClick={openAdd} aria-label="Add subscription"><PlusSm s={18} /></button>
          </header>

          <div className="scroll sub-scroll" onScroll={(e) => setScrolled(e.target.scrollTop > 22)}>
            {subs.length === 0 ? (
              <div className="sub-empty">
                <span className="e-ico"><RepeatGlyph /></span>
                <div className="e-title">No subscriptions yet</div>
                <div className="e-note">Add your recurring charges to see the real monthly damage.</div>
                <button className="add-sub" type="button" onClick={openAdd} style={{ marginTop: 18, maxWidth: 260 }}>
                  <PlusSm /> Add your first subscription
                </button>
              </div>
            ) : (
              <>
                <div className="sub-hero">
                  <div className="sub-hero-label">Total recurring</div>
                  <div className="sub-hero-num">${heroMo}<span className="mo">/mo</span></div>
                  <div className="sub-hero-sec">${heroYr.toLocaleString()}/yr · <b>{subs.length} active</b></div>
                  {cats.length > 1 && (
                    <div className="cat-breakdown">
                      {cats.map(([c, v]) => (
                        <span key={c} className="cat-pill">{c} <b>${Math.round(v)}</b></span>
                      ))}
                    </div>
                  )}
                </div>

                <div className="sec-label">Your subscriptions <span className="sub">{subs.length} total</span></div>
                <div className="sub-list">
                  {sorted.map((s) => (
                    <SwipeRow key={s.id} sub={s} onEdit={openEdit} onAskDelete={askDelete} />
                  ))}
                </div>
              </>
            )}
          </div>

          {/* add / edit sheet */}
          <div className={'sheet-overlay' + (form ? ' show' : '')} onClick={close} />
          <div className={'sheet' + (form ? ' show' : '')}>
            {form && (
              <>
                <div className="sheet-grab" />
                <h3 className="sheet-title">{form.id == null ? 'Add subscription' : 'Edit subscription'}</h3>

                <div className="field">
                  <label className="field-label">Name</label>
                  <input className="input" type="text" placeholder="e.g. Spotify Premium" value={form.name}
                    onChange={(e) => setForm({ ...form, name: e.target.value })} />
                </div>

                <div className="field">
                  <label className="field-label">Cost</label>
                  <div className="cost-wrap">
                    <span className="cur">$</span>
                    <input className="input" type="number" inputMode="decimal" min="0" step="0.01" placeholder="0.00" value={form.cost}
                      onChange={(e) => setForm({ ...form, cost: e.target.value })} />
                  </div>
                </div>

                <div className="field">
                  <label className="field-label">Billing cadence</label>
                  <div className="chips">
                    {CADENCES.map((c) => (
                      <button key={c.key} type="button" className={'chip' + (form.cadence === c.key ? ' on' : '')}
                        onClick={() => setForm({ ...form, cadence: c.key })}>{c.label}</button>
                    ))}
                  </div>
                </div>

                <div className="field">
                  <label className="field-label">Category</label>
                  <div className="chips" style={{ marginBottom: 10 }}>
                    {CAT_PRESETS.map((c) => (
                      <button key={c} type="button" className={'chip' + (form.category === c ? ' on' : '')}
                        onClick={() => setForm({ ...form, category: c })}>{c}</button>
                    ))}
                  </div>
                  <input className="input" type="text" placeholder="Or type your own" value={form.category}
                    onChange={(e) => setForm({ ...form, category: e.target.value })} />
                </div>

                <div className="sheet-actions">
                  {form.id != null && <button className="btn btn-danger" type="button" onClick={() => askDelete({ id: form.id, name: form.name })}>Delete</button>}
                  <button className="btn btn-primary" type="button" disabled={!valid} onClick={save}>
                    {form.id == null ? 'Add subscription' : 'Save changes'}
                  </button>
                </div>
              </>
            )}
          </div>

          {/* delete confirmation sheet */}
          <div className={'sheet-overlay' + (confirmDel ? ' show' : '')} onClick={() => setConfirmDel(null)} />
          <div className={'sheet' + (confirmDel ? ' show' : '')}>
            {confirmDel && (
              <>
                <div className="sheet-grab" />
                <h3 className="sheet-title">Delete {confirmDel.name}?</h3>
                <p className="confirm-note">This removes it from your subscriptions. You can always add it back later.</p>
                <div className="sheet-actions">
                  <button className="btn btn-ghost" type="button" onClick={() => setConfirmDel(null)}>Cancel</button>
                  <button className="btn btn-danger-solid" type="button" onClick={confirmDelete}>Delete</button>
                </div>
              </>
            )}
          </div>
        </>
      );
    }

    /* ======== Debts manager (near-clone of Subscriptions) ======== */
    const CardGlyph = () => (<svg {...gp}><rect x="3" y="6" width="18" height="12" rx="2.5"/><path d="M3 10h18"/><path d="M6.5 14.5h3"/></svg>);
    const HouseGlyph = () => (<svg {...gp}><path d="M4 11l8-6 8 6"/><path d="M6 10v9h12v-9"/><path d="M10.5 19v-4.5h3V19"/></svg>);

    const BankGlyph = () => (<svg {...gp}><path d="M4 9.5L12 5l8 4.5"/><path d="M5.5 10v7.5M18.5 10v7.5M10 10v7.5M14 10v7.5"/><path d="M3.5 20.5h17"/></svg>);

    const DEBT_KINDS = ['Credit card', 'Student loan', 'Auto', 'Mortgage', 'Medical', 'Personal', 'Other'];

    const INITIAL_DEBTS = [
      { id: 1, name: 'Car Loan', balance: 9800, apr: 7.9, minPay: 310, kind: 'Auto' },

    const kindGlyph = (k) => {

      if (c.includes('credit')) return <CardGlyph />;
      if (c.includes('mortgage') || c.includes('home')) return <HouseGlyph />;
      if (c.includes('medical') || c.includes('health')) return <HeartGlyph />;
      if (c.includes('student')) return <GradGlyph />;
      return <BankGlyph />;

    function DebtsScreen({ onBack }) {

      debts.forEach((d) => { byKind[d.kind] = (byKind[d.kind] || 0) + d.balance; });

      const openEdit = (d) => setForm({ id: d.id, name: d.name, balance: String(d.balance), apr: String(d.apr), minPay: String(d.minPay), kind: d.kind });

      const save = () => {

        const rec = { name: form.name.trim(), balance: parseFloat(form.balance), apr: parseFloat(form.apr) || 0, minPay: Math.round(parseFloat(form.minPay) || 0), kind: form.kind };
        if (form.id == null) setDebts((xs) => [...xs, { id: Date.now(), ...rec }]);
        else setDebts((xs) => xs.map((d) => (d.id === form.id ? { id: form.id, ...rec } : d)));
        close();

        <>

            <BackChevron onClick={onBack} label="Back to Financials" />
            <span className="pinned-title">Debts</span>
            <button className="pinned-add" type="button" onClick={openAdd} aria-label="Add debt"><PlusSm s={18} /></button>
          </header>

          <div className="scroll sub-scroll" onScroll={(e) => setScrolled(e.target.scrollTop > 22)}>
            {debts.length === 0 ? (
              <div className="sub-empty">
                <span className="e-ico"><BankGlyph /></span>
                <div className="e-title">No debts yet</div>
                <div className="e-note">Nothing here yet — add a debt, or your next roast will fill this in.</div>
                <button className="add-sub" type="button" onClick={openAdd} style={{ marginTop: 18, maxWidth: 280 }}>
                  <PlusSm /> Add your first debt
                </button>

                  <div className="sub-hero-label">Total debt</div>
                  <div className="sub-hero-num">${fmtBal(totalDebt)}</div>

                  <div className="chips" style={{ marginTop: 10 }}>
                    {DEBT_BAL_RANGES.map(([label, val]) => (
                      <button key={label} type="button" className={'chip' + (Number(form.balance) === val ? ' on' : '')}
                        onClick={() => setForm({ ...form, balance: String(val) })}>{label}</button>

                  <label className="field-label">APR (%)</label>
                  <input className="input" type="number" inputMode="decimal" min="0" step="0.1" placeholder="0.0" value={form.apr}
                    onChange={(e) => setForm({ ...form, apr: e.target.value })} />

                <div className="field">
                  <label className="field-label">Minimum payment</label>
                  <div className="cost-wrap">
                    <span className="cur">$</span>

                      onChange={(e) => setForm({ ...form, minPay: e.target.value })} />
                  </div>
                </div>

                <div className="field">
                  <label className="field-label">Kind</label>
                  <div className="chips">
                    {DEBT_KINDS.map((k) => (
                      <button key={k} type="button" className={'chip' + (form.kind === k ? ' on' : '')}
                        onClick={() => setForm({ ...form, kind: k })}>{k}</button>

                <div className="sheet-actions">

    const INITIAL_SPEND_CATS = [

      { id: 2, name: 'Dining out', amt: 180 },
      { id: 3, name: 'Car insurance', amt: 165 },
      { id: 4, name: 'Gas', amt: 160 },
    ];
    const SPEND_CONTEXT = 3700; // monthly expenses (MONEY OUT) — read-only context here

    function SpendRow({ item, max, onEdit, onAskDelete }) {
      const [dx, setDx] = useState(0);
      const [live, setLive] = useState(false);
      const startX = React.useRef(0);
      const base = React.useRef(0);
      const moved = React.useRef(false);
      const dragging = React.useRef(false);
      const OPEN = -84;
      const down = (e) => { dragging.current = true; setLive(true); moved.current = false; startX.current = e.clientX; base.current = dx; try { e.currentTarget.setPointerCapture(e.pointerId); } catch (_) {} };
      const move = (e) => { if (!dragging.current) return; let nd = base.current + (e.clientX - startX.current); if (nd > 0) nd = 0; if (nd < OPEN - 24) nd = OPEN - 24; if (Math.abs(e.clientX - startX.current) > 6) moved.current = true; setDx(nd); };
      const up = () => { if (!dragging.current) return; dragging.current = false; setLive(false); setDx((d) => (d <= OPEN / 2 ? OPEN : 0)); };
      const click = () => { if (moved.current) { moved.current = false; return; } if (dx !== 0) { setDx(0); return; } onEdit(item); };
      const pct = max > 0 ? Math.max(4, Math.round((item.amt / max) * 100)) : 0;
      return (
        <div className="swipe-wrap">
          <button className="swipe-del" type="button" tabIndex={-1}
            style={{ opacity: dx < -2 ? 1 : 0, transition: 'opacity .15s ease' }}
            onClick={() => { setDx(0); onAskDelete(item); }} aria-label={'Delete ' + item.name}>
            <TrashGlyph />
          </button>
          <div className={'swipe-fg spend-fg' + (live ? ' live' : '')} style={{ transform: 'translateX(' + dx + 'px)' }}
            role="button" tabIndex={0}
            onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerCancel={up}
            onClick={click} onKeyDown={(e) => { if (e.key === 'Enter') onEdit(item); }}>
            <div className="spend-row-top">
              <span className="sp-name">{item.name}</span>
              <span className="sp-trail"><span className="sp-amt">${item.amt.toLocaleString('en-US')}</span><span className="sub-r-chev"><Chev s={18} /></span></span>
            </div>
            <div className="spend-track"><div className="spend-fill" style={{ width: pct + '%' }} /></div>
          </div>
        </div>
      );
    }

    function SpendingScreen({ onBack }) {
      const [cats, setCats] = useState(INITIAL_SPEND_CATS);
      const [form, setForm] = useState(null);
      const [confirmDel, setConfirmDel] = useState(null);
      const [scrolled, setScrolled] = useState(false);

      const named = cats.reduce((a, c) => a + c.amt, 0);
      const sorted = [...cats].sort((a, b) => b.amt - a.amt); // biggest first
      const max = sorted.length ? sorted[0].amt : 0;
      const pct = SPEND_CONTEXT > 0 ? Math.min(100, Math.round((named / SPEND_CONTEXT) * 100)) : 0;

      const openAdd = () => setForm({ id: null, name: '', amt: '' });
      const openEdit = (c) => setForm({ id: c.id, name: c.name, amt: String(c.amt) });
      const close = () => setForm(null);
      const askDelete = (c) => { setForm(null); setConfirmDel(c); };
      const confirmDelete = () => { if (confirmDel) setCats((xs) => xs.filter((c) => c.id !== confirmDel.id)); setConfirmDel(null); };
      const valid = form && form.name.trim() && parseFloat(form.amt) > 0;
      const save = () => {
        if (!valid) return;
        const rec = { name: form.name.trim(), amt: Math.round(parseFloat(form.amt)) };
        if (form.id == null) setCats((xs) => [...xs, { id: Date.now(), ...rec }]);
        else setCats((xs) => xs.map((c) => (c.id === form.id ? { id: form.id, ...rec } : c)));
        close();
      };

      return (
        <>
          <header className={'pinned-bar' + (scrolled ? ' scrolled' : '')}>
            <BackChevron onClick={onBack} label="Back to Financials" />
            <span className="pinned-title">Spending</span>
            <button className="pinned-add" type="button" onClick={openAdd} aria-label="Add category"><PlusSm s={18} /></button>
          </header>

          <div className="scroll sub-scroll" onScroll={(e) => setScrolled(e.target.scrollTop > 22)}>
            {cats.length === 0 ? (
              <div className="sub-empty">
                <span className="e-ico"><BagGlyph /></span>
                <div className="e-title">Nothing named yet</div>
                <div className="e-note">Add a category, or your roasts will fill this in.</div>
                <button className="add-sub" type="button" onClick={openAdd} style={{ marginTop: 18, maxWidth: 280 }}>
                  <PlusSm /> Add a category
                </button>
              </div>
            ) : (
              <>
                <div className="sub-hero">
                  <div className="sub-hero-label">Named spending</div>
                  <div className="sub-hero-num">${named.toLocaleString('en-US')}<span className="mo">/mo</span></div>
                  <div className="sub-hero-sec">of your ${SPEND_CONTEXT.toLocaleString('en-US')}/mo spending</div>
                  <div className="spend-track" style={{ marginTop: 16, maxWidth: 240, marginLeft: 'auto', marginRight: 'auto' }}><div className="spend-fill" style={{ width: pct + '%' }} /></div>
                </div>

                <div className="sec-label">Your categories <span className="sub">{cats.length} named</span></div>
                <div className="sub-list">
                  {sorted.map((c) => (
                    <SpendRow key={c.id} item={c} max={max} onEdit={openEdit} onAskDelete={askDelete} />
                  ))}
                </div>
              </>
            )}
          </div>

          {/* add / edit sheet */}
          <div className={'sheet-overlay' + (form ? ' show' : '')} onClick={close} />
          <div className={'sheet' + (form ? ' show' : '')}>
            {form && (
              <>
                <div className="sheet-grab" />
                <h3 className="sheet-title">{form.id == null ? 'Add category' : 'Edit category'}</h3>
                <div className="field">
                  <label className="field-label">Name</label>
                  <input className="input" type="text" placeholder="e.g. Groceries" value={form.name}
                    onChange={(e) => setForm({ ...form, name: e.target.value })} />
                </div>
                <div className="field">
                  <label className="field-label">Amount</label>
                  <div className="cost-wrap">
                    <span className="cur">$</span>
                    <input className="input" type="number" inputMode="numeric" min="0" step="1" placeholder="0" value={form.amt}
                      onChange={(e) => setForm({ ...form, amt: e.target.value })} />
                  </div>
                </div>
                <div className="sheet-actions">
                  {form.id != null && <button className="btn btn-danger" type="button" onClick={() => askDelete({ id: form.id, name: form.name })}>Delete</button>}
                  <button className="btn btn-primary" type="button" disabled={!valid} onClick={save}>
                    {form.id == null ? 'Add category' : 'Save changes'}
                  </button>
                </div>
              </>
            )}
          </div>

          {/* delete confirmation */}
          <div className={'sheet-overlay' + (confirmDel ? ' show' : '')} onClick={() => setConfirmDel(null)} />
          <div className={'sheet' + (confirmDel ? ' show' : '')}>
            {confirmDel && (
              <>
                <div className="sheet-grab" />
                <h3 className="sheet-title">Delete {confirmDel.name}?</h3>
                <p className="confirm-note">This removes it from your named spending. You can always add it back later.</p>
                <div className="sheet-actions">
                  <button className="btn btn-ghost" type="button" onClick={() => setConfirmDel(null)}>Cancel</button>
                  <button className="btn btn-danger-solid" type="button" onClick={confirmDelete}>Delete</button>
                </div>
              </>
            )}
          </div>
        </>
      );
    }

    /* ======== Community ======== */
    const BellIcon = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6z"/><path d="M10 20a2 2 0 0 0 4 0"/></svg>);
    const ShareSm = () => (<svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12 15V4"/><path d="M8 8l4-4 4 4"/><path d="M5 13v5a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1v-5"/></svg>);
    const REACT_EMOJIS = ['\uD83D\uDD25', '\uD83E\uDEE1', '\uD83D\uDE2D', '\uD83D\uDC80', '\uD83E\uDD21'];
    function commBand(score) {
      if (score <= 40) return { label: 'Cooked', color: '#FF4D6D' };
      if (score <= 60) return { label: 'Surviving', color: '#FFB020' };
      if (score <= 80) return { label: 'Stable', color: '#00C2A8' };
      return { label: 'Thriving', color: '#00E676' };
    }
    const timeAgo = (m) => (m < 60 ? m + 'm' : m < 1440 ? Math.round(m / 60) + 'h' : Math.round(m / 1440) + 'd');
    const COMMUNITY_POSTS = [
      { id: 1, handle: 'maxedout', score: 34, mins: 5, roast: 'Your bank account has the emotional range of a heart monitor flatlining.', reactions: { '\uD83D\uDC80': 42, '\uD83D\uDE2D': 18, '\uD83E\uDD21': 7 }, mine: [] },
      { id: 2, handle: 'jason', score: 80, mins: 18, you: true, roast: 'Bestie, who let you get responsible? Respectfully \u2014 the algorithm fumbled serving a roast app to someone winning this hard.', reactions: { '\uD83D\uDD25': 120, '\uD83E\uDEE1': 64, '\uD83D\uDE2D': 9 }, mine: [] },
      { id: 3, handle: 'ramenforlife', score: 49, mins: 41, roast: 'Surviving on vibes and a 49. The vibes are doing some seriously heavy lifting.', reactions: { '\uD83D\uDE2D': 31, '\uD83D\uDD25': 12 }, mine: [] },
      { id: 4, handle: 'softlaunchceo', score: 85, mins: 70, roast: 'An 85? Save some financial stability for the rest of us, jeez.', reactions: { '\uD83D\uDD25': 88, '\uD83E\uDEE1': 40 }, mine: ['\uD83D\uDD25'] },
      { id: 5, handle: 'overdraftandy', score: 41, mins: 120, roast: 'Your overdraft fee has a loyalty punch card. One more and the tenth one is free.', reactions: { '\uD83D\uDC80': 27, '\uD83E\uDD21': 14 }, mine: [] },
      { id: 6, handle: 'jason', score: 66, mins: 300, you: true, roast: 'Two months ago this was a 58. Character development, apparently.', reactions: { '\uD83D\uDD25': 54, '\uD83E\uDEE1': 22 }, mine: [] },
      { id: 7, handle: 'thriftgremlin', score: 72, mins: 480, roast: 'Coupons stacked, dignity intact. A solid 72 of pure, joyless caution.', reactions: { '\uD83E\uDEE1': 33, '\uD83D\uDD25': 19 }, mine: [] },
      { id: 8, handle: 'yolospender', score: 28, mins: 840, roast: "You don't have a budget, you have a rough idea and a prayer.", reactions: { '\uD83D\uDC80': 61, '\uD83E\uDD21': 29, '\uD83D\uDE2D': 12 }, mine: [] },
      { id: 9, handle: 'indexfunddad', score: 91, mins: 1440, roast: '91. Boring on purpose. The index funds are index-funding while you sleep.', reactions: { '\uD83E\uDEE1': 71, '\uD83D\uDD25': 45 }, mine: ['\uD83E\uDEE1'] },
    ];

    function MiniRing({ score, color }) {
      const R = 19, C = 2 * Math.PI * R;
      return (
        <div className="mini-ring">
          <svg width="44" height="44" viewBox="0 0 44 44">
            <circle cx="22" cy="22" r={R} fill="none" stroke="rgba(255,255,255,0.09)" strokeWidth="3.5" />
            <circle cx="22" cy="22" r={R} fill="none" stroke={color} strokeWidth="3.5" strokeLinecap="round" strokeDasharray={C} strokeDashoffset={C * (1 - score / 100)} transform="rotate(-90 22 22)" />
          </svg>
          <span className="mr-num" style={{ color }}>{score}</span>
        </div>
      );
    }

    function PostCard({ post, idx, state, pop, onChip, onOpenPicker }) {
      const b = commBand(post.score);
      const { counts, mine } = state;
      const chips = REACT_EMOJIS.filter((em) => (counts[em] || 0) > 0 || mine.has(em));
      return (
        <div className="post-card feed-in" style={{ animationDelay: (idx * 0.06) + 's' }}>
          <div className="post-head">
            <MiniRing score={post.score} color={b.color} />
            <div className="post-id">
              <div className="post-handle-row">
                <span className="post-handle">@{post.handle}</span>
                {post.you && <span className="you-pill">You</span>}
                <span className="cband" style={{ color: b.color, background: b.color + '22', border: '1px solid ' + b.color + '55' }}><span className="cbdot" style={{ background: b.color }} />{b.label}</span>
              </div>
              <div className="post-time">{timeAgo(post.mins)}</div>
            </div>
          </div>
          <p className="post-roast">{post.roast}</p>
          <div className="react-row">
            {chips.map((em) => (
              <button key={em} type="button" className={'react-chip' + (mine.has(em) ? ' mine' : '') + (pop && pop.id === post.id && pop.em === em ? ' pop' : '')} onClick={() => onChip(post.id, em)}>
                <span className="em">{em}</span><span className="cnt">{counts[em]}</span>
              </button>
            ))}
            <button className="react-add" type="button" onClick={() => onOpenPicker(post.id)}>＋ React</button>
          </div>
        </div>
      );
    }

    function SkelCard() {
      return (
        <div className="skel-card">
          <div style={{ display: 'flex', gap: 11, alignItems: 'center' }}>
            <div className="skel" style={{ width: 44, height: 44, borderRadius: '50%' }} />
            <div style={{ flex: 1 }}>
              <div className="skel" style={{ width: '46%', height: 13 }} />
              <div className="skel" style={{ width: '26%', height: 10, marginTop: 7 }} />
            </div>
          </div>
          <div className="skel" style={{ width: '100%', height: 11, marginTop: 14 }} />
          <div className="skel" style={{ width: '82%', height: 11, marginTop: 7 }} />
          <div style={{ display: 'flex', gap: 7, marginTop: 14 }}>
            <div className="skel" style={{ width: 56, height: 32, borderRadius: 99 }} />
            <div className="skel" style={{ width: 56, height: 32, borderRadius: 99 }} />
          </div>
        </div>
      );
    }

    function CommShareSheet() {
      const ROASTS = [
        { id: 'a', score: 80, text: 'Bestie, who let you get responsible? Respectfully \u2014 winning this hard.' },
        { id: 'b', score: 66, text: 'Two months ago this was a 58. Character development, apparently.' },
        { id: 'c', score: 72, text: 'You saved money AND remembered to eat this month. Look at you.' },
      ];
      const [posted, setPosted] = useState({ a: true, b: true });
      return (
        <>
          <div className="sheet-grab" />
          <h3 className="sheet-title">Share to Community</h3>
          <p className="confirm-note">Roasts post anonymously — just your @handle, score, and the jab. Unpost anytime.</p>
          <div className="share-roasts">
            {ROASTS.map((r) => {
              const b = commBand(r.score);
              const on = !!posted[r.id];
              return (
                <div className="share-roast" key={r.id}>
                  <MiniRing score={r.score} color={b.color} />
                  <p className="sr-text">{r.text}</p>
                  <button className={'sr-toggle' + (on ? ' on' : '')} type="button" onClick={() => setPosted((p) => ({ ...p, [r.id]: !p[r.id] }))}>{on ? 'Posted' : 'Post'}</button>
                </div>
              );
            })}
          </div>
        </>
      );
    }

    function CommunityScreen() {
      const [seg, setSeg] = useState('trending');
      const [loading, setLoading] = useState(true);
      const [shareOpen, setShareOpen] = useState(false);
      const [rx, setRx] = useState(() => {
        const m = {};
        COMMUNITY_POSTS.forEach((p) => { m[p.id] = { counts: { ...p.reactions }, mine: new Set(p.mine || []) }; });
        return m;
      });
      const [pickerFor, setPickerFor] = useState(null);
      const [pop, setPop] = useState(null);
      React.useEffect(() => { const t = setTimeout(() => setLoading(false), 850); return () => clearTimeout(t); }, []);

      const onReact = (id, em) => {
        setRx((prev) => {
          const cur = prev[id]; const has = cur.mine.has(em);
          const mine = new Set(cur.mine); if (has) mine.delete(em); else mine.add(em);
          const counts = { ...cur.counts, [em]: Math.max(0, (cur.counts[em] || 0) + (has ? -1 : 1)) };
          return { ...prev, [id]: { counts, mine } };
        });
        setPop({ id, em }); setTimeout(() => setPop((p) => (p && p.id === id && p.em === em ? null : p)), 240);
        setPickerFor(null);
      };

      const total = (p) => Object.values(p.reactions).reduce((a, n) => a + n, 0);
      const posts = [...COMMUNITY_POSTS];
      if (seg === 'trending') posts.sort((a, b) => total(b) - total(a));
      else if (seg === 'recent') posts.sort((a, b) => a.mins - b.mins);
      else posts.sort((a, b) => a.score - b.score);
      return (
        <>
          <div className="scroll comm-scroll">
            <div className="comm-head">
              <div className="comm-title">Community</div>
              <button className="comm-bell" type="button" aria-label="Notifications"><BellIcon /><span className="dot" /></button>
            </div>
            <div className="comm-subtitle">Everyone's a little broke. Anonymous roasts and scores from people figuring it out too.</div>
            <div className="seg-ctrl">
              <button type="button" className={seg === 'trending' ? 'on' : ''} onClick={() => setSeg('trending')}>Trending</button>
              <button type="button" className={seg === 'recent' ? 'on' : ''} onClick={() => setSeg('recent')}>Recent</button>
              <button type="button" className={seg === 'lowest' ? 'on' : ''} onClick={() => setSeg('lowest')}>Lowest</button>
            </div>
            {loading
              ? <div className="feed">{[0, 1, 2, 3].map((i) => <SkelCard key={i} />)}</div>
              : posts.length === 0
                ? <div className="comm-empty"><div className="ee">🌱</div><div className="et">No posts yet — be the first to share your roast.</div></div>
                : <div className="feed">{posts.map((p, i) => <PostCard key={p.id} post={p} idx={i} state={rx[p.id]} pop={pop} onChip={onReact} onOpenPicker={setPickerFor} />)}</div>}
          </div>

          <button className="comm-fab" type="button" onClick={() => setShareOpen(true)}><ShareSm /> Share</button>
          <div className={'sheet-overlay' + (shareOpen ? ' show' : '')} onClick={() => setShareOpen(false)} />
          <div className={'sheet' + (shareOpen ? ' show' : '')}>{shareOpen && <CommShareSheet />}</div>

          {/* social-style reaction popover */}
          <div className={'react-scrim' + (pickerFor != null ? ' show' : '')} onClick={() => setPickerFor(null)} />
          <div className={'react-pop' + (pickerFor != null ? ' show' : '')} role="menu" aria-label="React">
            {REACT_EMOJIS.map((em) => (
              <button key={em} type="button" className="react-pop-em" onClick={() => { if (pickerFor != null) onReact(pickerFor, em); }}>{em}</button>
            ))}
          </div>
        </>
      );
    }

    function StubTab({ title }) {
      return (
        <div className="tab-stub">
          <div className="stub-box" />
          <div className="stub-title">{title}</div>
          <div className="stub-note">coming next</div>
        </div>
      );
    }

    function Shell() {
      const [tab, setTab] = useState('home');
      const [menuOpen, setMenuOpen] = useState(false);
      const [subsOpen, setSubsOpen] = useState(false);
      const [debtsOpen, setDebtsOpen] = useState(false);
      const [spendingOpen, setSpendingOpen] = useState(false);
      const content = subsOpen ? <SubscriptionsScreen onBack={() => setSubsOpen(false)} />
        : debtsOpen ? <DebtsScreen onBack={() => setDebtsOpen(false)} />
        : spendingOpen ? <SpendingScreen onBack={() => setSpendingOpen(false)} />
        : tab === 'home' ? <HomeScreen />
        : tab === 'financials' ? <FinancialsScreen onOpenSubs={() => setSubsOpen(true)} onOpenDebts={() => setDebtsOpen(true)} onOpenSpending={() => setSpendingOpen(true)} />
        : tab === 'community' ? <CommunityScreen />
        : <StubTab title="Profile" />;
      return (
        <div className="screen">
          {content}

          {/* action menu overlay */}
          <div className={'overlay' + (menuOpen ? ' show' : '')} onClick={() => setMenuOpen(false)} />
          <div className={'action-menu' + (menuOpen ? ' show' : '')}>
            <button className="act-card primary" type="button" onClick={() => setMenuOpen(false)}>
              <FlameIcon /><span className="act-label">Roast Me</span>
            </button>
            <button className="act-card" type="button" onClick={() => setMenuOpen(false)}>
              <CalCheckIcon /><span className="act-label">Check-In</span>
            </button>
            <button className="act-card" type="button" onClick={() => setMenuOpen(false)}>
              <ChecklistIcon /><span className="act-label">Update Plan</span>
            </button>
          </div>

          {/* floating pill nav */}
          <div className="navpill">
            {TABS.map((t) => {
              if (t.id === 'center') {
                return (
                  <div key="center" className="nav-center">
                    <button className={'fab' + (menuOpen ? ' open' : '')} type="button"
                            aria-label={menuOpen ? 'Close menu' : 'Open actions'}
                            onClick={() => setMenuOpen((o) => !o)}><Plus /></button>
                  </div>
                );
              }
              const active = tab === t.id;
              const col = active ? '#FF007A' : 'rgba(255,255,255,0.36)';
              return (
                <button key={t.id} className={'nav-item' + (active ? ' active' : '')} type="button"
                        aria-label={t.label} onClick={() => { setSubsOpen(false); setDebtsOpen(false); setSpendingOpen(false); setTab(t.id); }}>
                  {active ? (
                    <span className="ghost-pill"><t.Icon c={col} /></span>
                  ) : (
                    <t.Icon c={col} />
                  )}
                </button>
              );
            })}
          </div>
        </div>
      );
    }

    function App() {
      return (
        <IOSDevice dark>
          <Shell />
        </IOSDevice>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    function fit() {
      const W = 402, H = 874, pad = 36;
      const s = Math.min((window.innerWidth - pad) / W, (window.innerHeight - pad) / H, 1);
      document.getElementById('scaler').style.transform = 'scale(' + s + ')';
    }
    window.addEventListener('resize', fit);
    fit();
  </script>
</body>
</html>
